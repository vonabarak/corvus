executables:
  corvus:
    main: Main.hs
    source-dirs: app/daemon
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - corvus

  crv:
    main: Main.hs
    source-dirs: app/client
    ghc-options:
      - -threaded
      - -rtsopts
    dependencies:
      - corvus

  corvus-netd:
    main: Main.hs
    source-dirs: app/netd
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - corvus

  corvus-nodeagent:
    main: Main.hs
    source-dirs: app/nodeagent
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - corvus

tests:
  corvus-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - corvus
      - hspec
      - hspec-discover
      - hspec-expectations
      - QuickCheck
      - random
      - uuid
      - async
      - silently
