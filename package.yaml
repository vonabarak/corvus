name: corvus
version: 0.8.0.0
synopsis: Daemon/client application with RPC communication
description: A Haskell daemon that runs as a systemd service with a CLI client
license: BSD-3-Clause
author: Author
maintainer: author@example.com

# Cabal flags. 'python-client' gates the optional Python extension
# (foreign-library corvus-python + executable gen-python-client). When
# off, ginger and file-embed are not required at build time, and the
# codegen tool plus the abi3 .so are simply not produced. Enable with
# `cabal build --flags=+python-client` or `stack build --flag
# corvus:python-client`.
flags:
  python-client:
    description: Build the Python client FFI extension and codegen tool
    manual: true
    default: false

dependencies:
  - base >= 4.7 && < 5
  - binary
  - network-simple
  - async
  - stm
  - text
  - bytestring
  - vector
  - optparse-applicative
  - unix
  - directory
  - filepath
  - process
  - network
  - time
  - persistent
  - persistent-postgresql
  - esqueleto
  - monad-logger
  - resource-pool
  - mtl
  - unliftio-core
  - exceptions
  - aeson
  - aeson-qq
  - yaml
  - template-haskell
  - haskell-src-meta
  - random
  - fourmolu
  - base64-bytestring
  - containers
  - temporary
  - ansi-terminal
  - gitrev

default-extensions:
  - OverloadedStrings
  - DeriveGeneric
  - DeriveAnyClass
  - DerivingStrategies
  - GeneralizedNewtypeDeriving
  - StandaloneDeriving
  - TypeFamilies
  - GADTs
  - UndecidableInstances
  - DataKinds
  - FlexibleInstances
  - MultiParamTypeClasses
  - QuasiQuotes
  - TemplateHaskell

