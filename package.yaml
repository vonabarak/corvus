    - Corvus.Client.Parser.Vm
    - Corvus.Client.Parser.Disk
    - Corvus.Client.Parser.Snapshot
    - Corvus.Client.Parser.SshKey
    - Corvus.Client.Parser.SharedDir
    - Corvus.Client.Parser.NetIf
    - Corvus.Client.Parser.Template
    - Corvus.Client.Parser.Network
    - Corvus.Client.Parser.Apply
    - Corvus.Client.Parser.CloudInit
