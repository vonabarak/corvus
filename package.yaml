name: corvus
version: 0.12.0.0
synopsis: Daemon/client application with RPC communication
description: A Haskell daemon that runs as a systemd service with a CLI client
license: BSD-3-Clause
author: Author
maintainer: author@example.com

dependencies:
  - base >= 4.7 && < 5
  - network-simple
  - async
  - stm
  - text
  - bytestring
  - vector
  - optparse-applicative
  - unix
  - directory
  - filepath
  - process
  - network
  - time
  - persistent
  - persistent-postgresql
  - monad-logger
  - resource-pool
  - mtl
  - exceptions
  - aeson
  - aeson-qq
  - yaml
  - template-haskell
  - haskell-src-meta
  - random
  - base64-bytestring
  - containers
  - temporary
  - ansi-terminal
  - gitrev
  - capnp
  - supervisors
  - data-default
  - tls
  - crypton
  - crypton-x509
  - crypton-x509-store
  - crypton-x509-validation
  - asn1-types
  - transformers
  - memory

default-extensions:
  - OverloadedStrings
  - DeriveGeneric
  - DeriveAnyClass
  - DerivingStrategies
  - GeneralizedNewtypeDeriving
  - StandaloneDeriving
  - TypeFamilies
  - GADTs
  - UndecidableInstances
  - DataKinds
  - FlexibleInstances
  - MultiParamTypeClasses
  - QuasiQuotes
  - TemplateHaskell

library:
  source-dirs:
    - src
    - src-generated   # Cap'n Proto schema-generated modules; regenerate with `make capnp`
  c-sources:
    - cbits/vsock_probe.c
  include-dirs:
    - cbits
  exposed-modules:
