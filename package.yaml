name: corvus
version: 0.1.0.0
synopsis: Daemon/client application with RPC communication
description: A Haskell daemon that runs as a systemd service with a CLI client
license: BSD-3-Clause
author: Author
maintainer: author@example.com

dependencies:
  - base >= 4.7 && < 5
  - binary
  - network-simple
  - async
  - stm
  - text
  - bytestring
  - vector
  - optparse-applicative
  - unix
  - directory
  - filepath
  - process
  - network
  - time
  - persistent
  - persistent-postgresql
  - esqueleto
  - monad-logger
  - resource-pool
  - mtl
  - unliftio-core
  - exceptions
  - aeson
  - aeson-qq
  - yaml
  - template-haskell
  - haskell-src-meta
  - random
  - fourmolu
  - base64-bytestring
  - containers

default-extensions:
  - OverloadedStrings
  - DeriveGeneric
  - DeriveAnyClass
  - DerivingStrategies
  - GeneralizedNewtypeDeriving
  - StandaloneDeriving
  - TypeFamilies
  - GADTs
  - UndecidableInstances
  - DataKinds
  - FlexibleInstances
  - MultiParamTypeClasses
  - QuasiQuotes
  - TemplateHaskell

library:
  source-dirs: src
  exposed-modules:
    - Corvus.Protocol
    - Corvus.Types
    - Corvus.Server
    - Corvus.Handlers
    - Corvus.Handlers.Core
    - Corvus.Handlers.Vm
    - Corvus.Handlers.Disk
    - Corvus.Handlers.SharedDir
    - Corvus.Handlers.NetIf
    - Corvus.Handlers.SshKey
    - Corvus.CloudInit
    - Corvus.Client
    - Corvus.Client.Config
    - Corvus.Client.Output
    - Corvus.Client.Connection
    - Corvus.Client.Rpc
    - Corvus.Client.Types
    - Corvus.Client.Parser
    - Corvus.Client.Commands
    - Corvus.Client.Commands.Vm
    - Corvus.Client.Commands.Disk
    - Corvus.Client.Commands.SharedDir
    - Corvus.Client.Commands.NetIf
    - Corvus.Client.Commands.SshKey
    - Corvus.Client.Commands.Template
    - Corvus.Model
    - Corvus.Qemu
    - Corvus.Qemu.Config
    - Corvus.Qemu.Runtime
    - Corvus.Qemu.Qmp
    - Corvus.Utils.Yaml
    - Corvus.Utils.Subnet
    - Corvus.Qemu.Process
    - Corvus.Qemu.Command
    - Corvus.Qemu.Virtiofsd
    - Corvus.Qemu.Image
    - Corvus.Qemu.GuestAgent
    - Corvus.Handlers.GuestExec
    - Corvus.Handlers.GuestAgentPoller
    - Corvus.Handlers.Apply
    - Corvus.Client.Commands.GuestExec
    - Corvus.Client.Commands.Apply

executables:
  corvus:
    main: Main.hs
    source-dirs: app/daemon
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - corvus

  crv:
    main: Main.hs
    source-dirs: app/client
    ghc-options:
      - -threaded
      - -rtsopts
    dependencies:
      - corvus

tests:
  corvus-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - corvus
      - hspec
      - hspec-discover
      - hspec-expectations
      - QuickCheck
      - random
      - uuid
      - temporary
      - async
