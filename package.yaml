# Python extension module. hpack has no native support for foreign-library
# stanzas, so we emit one via `verbatim`. The produced .so is dlopened by
# CPython as `_corvus.abi3.so`. Python headers are located via pkg-config;
# default module is `python-3.13`. Override by regenerating the .cabal with
# a different entry here if your system has a different Python installed.
verbatim: |
  foreign-library corvus-python
    if !flag(python-client)
      buildable: False
    type:                native-shared
    lib-version-info:    0:0:0
    hs-source-dirs:      ffi-src
    other-modules:       Corvus.Python
                         Corvus.Python.Call
                         Corvus.Python.Connection
                         Corvus.Python.Marshal
    c-sources:           cbits/python_ext.c
    -- `pkgconfig-depends` adds GHC flags but not the C include path on
    -- every Cabal/Stack combo, so we also inject the Python include dir
    -- explicitly. Override by editing this line for a different Python.
    include-dirs:        cbits, /usr/include/python3.13
    pkgconfig-depends:   python-3.13
    build-depends:       base, corvus, bytestring, text, aeson, network, binary
    ghc-options:         -threaded -fPIC
    cc-options:          -fPIC -DPy_LIMITED_API=0x030A0000
    default-language:    Haskell2010
    default-extensions:  OverloadedStrings ForeignFunctionInterface TypeApplications LambdaCase

executables:
  corvus:
    main: Main.hs
    source-dirs: app/daemon
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - corvus

  crv:
    main: Main.hs
    source-dirs: app/client
    ghc-options:
      - -threaded
      - -rtsopts
    dependencies:
      - corvus

  gen-python-client:
    main: Main.hs
    source-dirs: app/gen-python-client
    ghc-options:
      - -threaded
      - -rtsopts
    when:
      - condition: "!flag(python-client)"
        buildable: false
    dependencies:
      - corvus
      - file-embed
      - ginger
      - unordered-containers

tests:
  corvus-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - corvus
      - hspec
      - hspec-discover
      - hspec-expectations
      - QuickCheck
      - random
      - uuid
      - async
      - silently
