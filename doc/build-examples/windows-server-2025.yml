---
# Windows Server 2025 evaluation image, built unattended.
#
# Bakes a Windows Server 2025 image with qemu-guest-agent and
# cloudbase-init pre-installed. Equivalent to the legacy script at
# scripts/build-windows-test-image.sh but expressed declaratively
# through `crv build`.
#
# Prerequisites:
#   1. Apply doc/apply-examples/windows-installer.yml first to register
#      the install ISOs and define the windows-server-2025-installer
#      template.
#   2. The bake host must NAT the bridged subnet (cloudbase-init is
#      downloaded from the public internet during FirstLogonCommands).
#
# Usage:
#   crv apply doc/apply-examples/windows-installer.yml
#   crv build doc/build-examples/windows-server-2025.yml --wait
#
# Expect 20–40 minutes wall time. The bake VM is headless; if you
# want to watch the install graphically, swap headless: false in the
# template and connect via SPICE.

builds:
  - name: windows-server-2025
    description: "Windows Server 2025 with qemu-guest-agent + cloudbase-init"
    template: windows-server-2025-installer

    target:
      name: windows-server-2025-eval
      format: qcow2
      sizeGb: 40
      compact: true

    # The installer strategy:
    #   * does not require guestAgent: true on the template
    #   * does not run any provisioners (autounattend.xml drives the
    #     entire install)
    #   * waits for the guest to power itself off, then captures the
    #     first drive as the artifact.
    strategy: installer

    vm:
      cpuCount: 4
      ramMb: 4096

    # Dismiss UEFI's "Press any key to boot from CD or DVD..." prompt.
    # OVMF prints this once on first boot of the Windows installer
    # ISO; if no key is received within ~5 seconds it falls through
    # to the (empty) boot disk and hangs in the EFI shell.
    bootKeys:
      - keys: ret
        delaySec: 3
        repeat: 6
        intervalSec: 1

    # 60 minutes; Windows install + cloudbase-init MSI typically
    # takes 20–35 min on KVM. The autounattend's last command is
    # `shutdown /s /t 30 /f`, so the guest powers off cleanly.
    waitForShutdownSec: 3600

    # No QGA-based provisioners: autounattend.xml does it all.
    provisioners: []

    # On failure leave the bake VM alive so the operator can connect
    # via SPICE and inspect Windows install logs at C:\Windows\Panther\.
    cleanup: onSuccess
