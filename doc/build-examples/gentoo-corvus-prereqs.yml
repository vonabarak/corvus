# Prereq apply config for `crv build doc/build-examples/gentoo-corvus.yml`.
#
# Defines a `gentoo-corvus-base` template whose cloud-init userData
# preinstalls and enables qemu-guest-agent so the bake VM can talk to
# the daemon over QGA. Without this, the multi-os.yml `gentoo20260412`
# template's bake VM never opens its QGA socket and the daemon's
# `waitForFirstPing` waits forever.
#
# The Gentoo cloud image (`current-di-amd64-cloudinit`) ships with the
# Gentoo binhost preconfigured but no portage tree, no qemu-ga, and a
# UEFI-only boot — so this template adds OVMF firmware drives and the
# cloud-init userData syncs portage + emerges `app-emulation/qemu-guest-agent`
# (a small standalone package; the full app-emulation/qemu is compiled
# during the build's provisioner steps because none of the binhost
# qemu binpkgs match the corvus daemon's required USE flag set).
#
# Reuses `gentoo-20260412-base`, `ovmf-code`, `ovmf-vars` from
# multi-os.yml — apply that file first.
#
# Run:
#   crv apply doc/build-examples/gentoo-corvus-prereqs.yml
#   crv build doc/build-examples/gentoo-corvus.yml

sshKeys:
  - name: corvus
    publicKey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDpO6w7latI2iS1Q7SctsaIXa/p4K9DbJfNTmuQwDVOD"

templates:
  - name: gentoo-corvus-base
    cpuCount: 4
    ramMb: 4096
    cloudInit: true
    guestAgent: true
    description: "Gentoo base for corvus-test bake (qemu-ga preinstalled via cloud-init)"
    cloudInitConfig:
      userData:
        # The Gentoo cloud image has no portage tree at /var/db/repos/gentoo
        # and no qemu-ga; sync the tree, emerge the small standalone
        # qemu-guest-agent binary, then enable+start the service so the
        # daemon's waitForFirstPing succeeds.
        runcmd:
          - emerge-webrsync --quiet
          - emerge --getbinpkg --usepkg --binpkg-respect-use=y --quiet-build app-emulation/qemu-guest-agent
          - systemctl enable --now qemu-guest-agent.service
    drives:
      - diskImageName: gentoo-20260412-base
        interface: virtio
        strategy: overlay
        cacheType: writeback
        discard: true
      - diskImageName: ovmf-code
        interface: pflash
        readOnly: true
        strategy: direct
      - diskImageName: ovmf-vars
        interface: pflash
        strategy: clone
    networkInterfaces:
      - type: vde
        hostDevice: /run/vde2/switch.ctl
    sshKeys:
      - name: corvus
