# Prerequisites for `crv build doc/build-examples/ubuntu-nginx.yml`.
#
# Creates the OVMF firmware disks, imports the upstream Ubuntu 24.04
# cloud image, and registers an `ubuntu24` template that boots that
# image with cloud-init + qemu-guest-agent enabled. Networking uses the
# user-mode netdev (slirp), which works on any host without a VDE
# switch or managed bridge — handy for one-off bake hosts where you
# just need the bake VM to reach the internet for `apt-get install`.
#
# Replace the public key with one whose private half you actually have
# if you want to ssh into instances of the template; the build pipeline
# itself drives provisioning over QGA, not SSH, so the key isn't
# strictly required for baking.
#
# Apply order:
#   crv apply doc/build-examples/ubuntu-nginx-prereqs.yml
#   crv build doc/build-examples/ubuntu-nginx.yml

sshKeys:
  - name: corvus-build
    publicKey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDpO6w7latI2iS1Q7SctsaIXa/p4K9DbJfNTmuQwDVOD"

disks:
  # OVMF firmware. Adjust paths if your distribution installs edk2
  # somewhere else.
  - name: ovmf-code
    register: "/usr/share/edk2/OvmfX64/OVMF_CODE_4M.qcow2"
    format: qcow2
  - name: ovmf-vars
    register: "/usr/share/edk2/OvmfX64/OVMF_VARS_4M.qcow2"
    format: qcow2

  - name: ubuntu-24.04-base
    import: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    format: qcow2
    path: BaseImages/Ubuntu/

templates:
  - name: ubuntu24
    cpuCount: 4
    ramMb: 4096
    cloudInit: true
    guestAgent: true
    description: "Ubuntu 24.04 LTS (build-pipeline target)"
    cloudInitConfig:
      userData:
        packages:
          - qemu-guest-agent
        runcmd:
          - systemctl enable --now qemu-guest-agent
    drives:
      - diskImageName: ubuntu-24.04-base
        interface: virtio
        strategy: overlay
        cacheType: writeback
        discard: true
      - diskImageName: ovmf-code
        interface: pflash
        readOnly: true
        strategy: direct
      - diskImageName: ovmf-vars
        interface: pflash
        strategy: clone
    networkInterfaces:
      - type: user
    sshKeys:
      - name: corvus-build
