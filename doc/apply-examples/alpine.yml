---

disks:
  # Shared UEFI firmware code (read-only, from edk2 package)
  - name: ovmf-code
    register: "/usr/share/edk2/OvmfX64/OVMF_CODE.fd"
    format: raw

  # OVMF UEFI vars (for cloning)
  - name: ovmf-vars
    register: "/usr/share/edk2/OvmfX64/OVMF_VARS.fd"
    format: raw

  - name: alpine-test-base
    register: "/home/bobr/Work/corvus/.test-images/corvus-test.qcow2"
    format: qcow2

  - name: alpine-test
    overlay: alpine-test-base
    path: alpine-test/

  - name: alpine-test-ovmf-vars
    clone: ovmf-vars
    path: alpine-test/

networks:
  - name: vnet1
    dhcp: true
    nat: true
    subnet: "192.168.92.0/24"

vms:
  - name: alpine-test
    cpuCount: 4
    ramMb: 4096
    description: "alpine-test"
    cloudInit: true
    guestAgent: true
    drives:
      - disk: alpine-test
        interface: virtio
        media: disk
        cacheType: writeback
        discard: true
      - disk: ovmf-code
        interface: pflash
        readOnly: true
      - disk: alpine-test-ovmf-vars
        interface: pflash
    networkInterfaces:
      - type: vde
        hostDevice: /run/vde2/switch.ctl
      - network: vnet1
