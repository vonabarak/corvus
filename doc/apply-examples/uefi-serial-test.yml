---
# Bare UEFI VM with no OS and no VGA adapter.
# Boots into the OVMF firmware setup menu over serial console.
# Use `crv vm view <vm>` to interact with the UEFI menu via Ctrl+].

disks:
  - name: ovmf-code
    import: "/usr/share/edk2/OvmfX64/OVMF_CODE.fd"
    format: raw

  - name: ovmf-vars
    import: "/usr/share/edk2/OvmfX64/OVMF_VARS.fd"
    format: raw

  - name: uefi-serial-test-ovmf-vars
    clone: ovmf-vars
    path: uefi-serial-test/

  - name: uefi-serial-test-disk
    create: true
    format: qcow2
    sizeMb: 1024
    path: uefi-serial-test/

vms:
  - name: uefi-serial-test
    cpuCount: 1
    ramMb: 512
    description: "Bare UEFI VM for serial console testing"
    headless: true
    guestAgent: false
    cloudInit: false
    drives:
      - disk: ovmf-code
        interface: pflash
        readOnly: true
      - disk: uefi-serial-test-ovmf-vars
        interface: pflash
      - disk: uefi-serial-test-disk
        interface: virtio
        media: disk
        cacheType: writeback
