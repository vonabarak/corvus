#sshKeys:
#  - name: corvus
#    publicKey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDpO6w7latI2iS1Q7SctsaIXa/p4K9DbJfNTmuQwDVOD"

disks:
  # Shared UEFI firmware code (read-only, from edk2 package)
  - name: ovmf-code
    register: "/usr/share/edk2/OvmfX64/OVMF_CODE.fd"
    format: raw

  # OVMF UEFI vars (for cloning)
  - name: ovmf-vars
    register: "/usr/share/edk2/OvmfX64/OVMF_VARS.fd"
    format: raw

  - name: gentoo-cloud-base
    # import: "https://distfiles.gentoo.org/releases/amd64/autobuilds/current-di-amd64-cloudinit/di-amd64-cloudinit-20260316T093103Z.qcow2"
    register: "di-amd64-cloudinit-20260316T093103Z.qcow2"
    format: qcow2

#  - name: gentoo
#    overlay: gentoo-cloud-base
#    path: gentoo/
  - name: gentoo
    register: gentoo/gentoo.qcow2

  - name: gentoo-ovmf-vars
    clone: ovmf-vars
    path: gentoo/

#networks:
#  - name: vnet1
#    dhcp: true
#    nat: true
#    subnet: "192.168.92.0/24"

vms:
  - name: gentoo
    cpuCount: 8
    ramMb: 32768
    description: "Gentoo"
#    cloudInit: true
    guestAgent: true
    drives:
      - disk: gentoo
        interface: virtio
        media: disk
        cacheType: writeback
        discard: true
      - disk: ovmf-code
        interface: pflash
        readOnly: true
      - disk: gentoo-ovmf-vars
        interface: pflash
#    sshKeys:
#      - corvus
    networkInterfaces:
      - type: vde
        hostDevice: /run/vde2/switch.ctl
#      - network: vnet1
