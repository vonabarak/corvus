---

disks:
  - name: windows-server-2012-r2-base
    # https://cloudbase.it/windows-cloud-images/
    register: "BaseImages/windows_server_2012_r2_standard_eval_kvm_20170321.qcow2"
    format: qcow2

  - name: windows-server-2012-r2
    overlay: windows-server-2012-r2-base
    path: windows-server-2012-r2/

#networks:
#  - name: vnet1
#    dhcp: true
#    nat: true
#    subnet: "192.168.92.0/24"

vms:
  - name: windows-server-2012-r2
    cpuCount: 4
    ramMb: 4096
    description: "Windows Server 2012 R2"
    cloudInit: true
    guestAgent: true
    cloudInitConfig:
      injectSshKeys: false
      userData: |
        #ps1_sysnative
        # Set Administrator password
        net user Administrator "CHANGE_ME" /y
        # Enable and start QEMU Guest Agent
        Set-Service -Name QEMU-GA -StartupType Automatic
        Start-Service QEMU-GA
    drives:
      - disk: windows-server-2012-r2
        interface: virtio
        media: disk
        cacheType: writeback
        discard: true
    networkInterfaces:
      - type: vde
        hostDevice: /run/vde2/switch.ctl
#      - network: vnet1
