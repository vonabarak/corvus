---

disks:
  # Shared UEFI firmware code (read-only, from edk2 package)
  - name: ovmf-code
    register: "/usr/share/edk2/OvmfX64/OVMF_CODE_4M.qcow2"
    format: qcow2

  # OVMF UEFI vars (for cloning)
  - name: ovmf-vars
    register: "/usr/share/edk2/OvmfX64/OVMF_VARS_4M.qcow2"
    format: qcow2

  # Windows Server 2025 system disk (pre-existing install)
  - name: ws25-system
    register: "ws25/overlay.qcow2"
    format: qcow2
    sizeMb: 102400

  # OVMF UEFI vars for Windows Server (fresh copy)
  - name: ws25-ovmf-vars
    clone: ovmf-vars
    path: ws25/

vms:
  - name: ws25
    cpuCount: 8
    ramMb: 8192
    description: "Windows Server 2025"
    drives:
      - disk: ws25-system
        interface: virtio
        media: disk
        cacheType: writeback
        discard: true
      - disk: ovmf-code
        interface: pflash
        readOnly: true
      - disk: ws25-ovmf-vars
        interface: pflash
    networkInterfaces:
      - type: vde
        hostDevice: /run/vde2/switch.ctl
        mac: 08:00:27:4b:3d:ac
    sharedDirs:
      - path: /home/bobr/Dropbox
        tag: dropbox
        cache: auto
