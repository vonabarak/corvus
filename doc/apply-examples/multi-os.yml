---

sshKeys:
  - name: corvus
    publicKey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDpO6w7latI2iS1Q7SctsaIXa/p4K9DbJfNTmuQwDVOD"

disks:
  # Shared UEFI firmware code (read-only, from edk2 package)
  - name: ovmf-code
    register: "/usr/share/edk2/OvmfX64/OVMF_CODE_4M.qcow2"
    format: qcow2

  # OVMF UEFI vars (for cloning)
  - name: ovmf-vars
    register: "/usr/share/edk2/OvmfX64/OVMF_VARS_4M.qcow2"
    format: qcow2

  - name: debian-12-generic-base
    import: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-generic-amd64.qcow2"
    format: qcow2
    path: BaseImages/Debian/

  - name: debian12
    overlay: debian-12-generic-base
    path: debian12/

  - name: debian12-ovmf-vars
    clone: ovmf-vars
    path: debian12/

  - name: ubuntu-24.04-server-base
    import: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    format: qcow2
    path: BaseImages/Ubuntu/

  - name: ubuntu24
    overlay: ubuntu-24.04-server-base
    path: ubuntu24/

  - name: ubuntu24-ovmf-vars
    clone: ovmf-vars
    path: ubuntu24/


  - name: almalinux-10-base
    import: "https://repo.almalinux.org/almalinux/10/cloud/x86_64_v2/images/AlmaLinux-10-GenericCloud-10.1-20251125.0.x86_64_v2.qcow2"
    format: qcow2
    path: BaseImages/Almalinux/

  - name: almalinux10
    overlay: almalinux-10-base
    path: almalinux10/

  - name: almalinux10-ovmf-vars
    clone: ovmf-vars
    path: almalinux10/

  - name: freebsd-14-base
    import: "https://download.freebsd.org/releases/VM-IMAGES/14.4-RELEASE/amd64/Latest/FreeBSD-14.4-RELEASE-amd64-BASIC-CLOUDINIT-ufs.qcow2.xz"
    format: qcow2
    path: BaseImages/FreeBSD/

  - name: freebsd14
    overlay: freebsd-14-base
    path: freebsd14/

  - name: freebsd14-ovmf-vars
    clone: ovmf-vars
    path: freebsd14/

  - name: gentoo-20260405-base
    import: "https://distfiles.gentoo.org/releases/amd64/autobuilds/current-di-amd64-cloudinit/di-amd64-cloudinit-20260405T170105Z.qcow2"
    format: qcow2
    path: BaseImages/Gentoo/

  - name: gentoo20260405
    overlay: gentoo-20260405-base
    path: gentoo20260405/

  - name: gentoo20260405-ovmf-vars
    clone: ovmf-vars
    path: gentoo20260405/

vms:
  - name: debian12
    cpuCount: 4
    ramMb: 4096
    description: "Debian 12"
    cloudInit: true
    guestAgent: true
    drives:
      - disk: debian12
        interface: virtio
        media: disk
        cacheType: writeback
        discard: true
      - disk: ovmf-code
        interface: pflash
        readOnly: true
      - disk: debian12-ovmf-vars
        interface: pflash
    sshKeys:
      - corvus
    networkInterfaces:
      - type: vde
        hostDevice: /run/vde2/switch.ctl

  - name: ubuntu24
    cpuCount: 4
    ramMb: 4096
    description: "Ubuntu 24.04"
    cloudInit: true
    guestAgent: true
    drives:
      - disk: ubuntu24
        interface: virtio
        media: disk
        cacheType: writeback
        discard: true
      - disk: ovmf-code
        interface: pflash
        readOnly: true
      - disk: ubuntu24-ovmf-vars
        interface: pflash
    sshKeys:
      - corvus
    networkInterfaces:
      - type: vde
        hostDevice: /run/vde2/switch.ctl

  - name: almalinux10
    cpuCount: 4
    ramMb: 4096
    description: "Almalinux 10"
    cloudInit: true
    guestAgent: true
    drives:
      - disk: almalinux10
        interface: virtio
        media: disk
        cacheType: writeback
        discard: true
      - disk: ovmf-code
        interface: pflash
        readOnly: true
      - disk: almalinux10-ovmf-vars
        interface: pflash
    sshKeys:
      - corvus
    networkInterfaces:
      - type: vde
        hostDevice: /run/vde2/switch.ctl

  - name: freebsd14
    cpuCount: 4
    ramMb: 4096
    description: "FreeBSD 14"
    cloudInit: true
    guestAgent: true
    cloudInitConfig:
      userData:
        packages:
          - qemu-guest-agent
        runcmd:
          - sysrc qemu_guest_agent_enable=YES
          - service qemu-guest-agent start
    drives:
      - disk: freebsd14
        interface: virtio
        media: disk
        cacheType: writeback
        discard: true
      - disk: ovmf-code
        interface: pflash
        readOnly: true
      - disk: freebsd14-ovmf-vars
        interface: pflash
    sshKeys:
      - corvus
    networkInterfaces:
      - type: vde
        hostDevice: /run/vde2/switch.ctl

  - name: gentoo20260405
    cpuCount: 4
    ramMb: 4096
    description: "Gentoo 2026.03.16"
    cloudInit: true
    guestAgent: true
    drives:
      - disk: gentoo20260405
        interface: virtio
        media: disk
        cacheType: writeback
        discard: true
      - disk: ovmf-code
        interface: pflash
        readOnly: true
      - disk: gentoo20260405-ovmf-vars
        interface: pflash
    sshKeys:
      - corvus
    networkInterfaces:
      - type: vde
        hostDevice: /run/vde2/switch.ctl
