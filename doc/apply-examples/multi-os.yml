---
# Multi-OS template library.
#
# Imports base cloud images for several Linux distributions and FreeBSD,
# then defines a template for each OS. No VMs are created — use
# `crv template instantiate <template> <vm-name>` to spin up instances.
#
# Usage:
#   crv apply multi-os.yml
#   crv template instantiate debian12 my-debian-vm
#   crv vm start my-debian-vm

sshKeys:
  - name: corvus
    publicKey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDpO6w7latI2iS1Q7SctsaIXa/p4K9DbJfNTmuQwDVOD"

disks:
  # Shared UEFI firmware code (read-only, from edk2 package)
  - name: ovmf-code
    register: "/usr/share/edk2/OvmfX64/OVMF_CODE_4M.qcow2"
    format: qcow2

  # OVMF UEFI vars template (cloned per-VM by each template)
  - name: ovmf-vars
    register: "/usr/share/edk2/OvmfX64/OVMF_VARS_4M.qcow2"
    format: qcow2

  # ── Base cloud images ──────────────────────────────────────────────────

  - name: debian-12-generic-base
    import: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-generic-amd64.qcow2"
    format: qcow2
    path: BaseImages/Debian/

  - name: ubuntu-24.04-server-base
    import: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    format: qcow2
    path: BaseImages/Ubuntu/

  - name: almalinux-10-base
    import: "https://repo.almalinux.org/almalinux/10/cloud/x86_64_v2/images/AlmaLinux-10-GenericCloud-10.1-20251125.0.x86_64_v2.qcow2"
    format: qcow2
    path: BaseImages/Almalinux/

  - name: freebsd-14-base
    import: "https://download.freebsd.org/releases/VM-IMAGES/14.4-RELEASE/amd64/Latest/FreeBSD-14.4-RELEASE-amd64-BASIC-CLOUDINIT-ufs.qcow2.xz"
    format: qcow2
    path: BaseImages/FreeBSD/

  - name: gentoo-20260412-base
    import: "https://distfiles.gentoo.org/releases/amd64/autobuilds/current-di-amd64-cloudinit/di-amd64-cloudinit-20260426T153103Z.qcow2"
    format: qcow2
    path: BaseImages/Gentoo/

# ── YAML anchors for shared template settings ──────────────────────────
# Anchors defined on ignored top-level keys (only sshKeys, disks,
# networks, vms, templates are recognized by the parser).

_defaults: &defaults
  cpuCount: 4
  ramMb: 4096
  cloudInit: true
  guestAgent: true

_ovmf_code_drive: &ovmf_code
  diskImageName: ovmf-code
  interface: pflash
  readOnly: true
  strategy: direct

_ovmf_vars_drive: &ovmf_vars
  diskImageName: ovmf-vars
  interface: pflash
  strategy: clone

# ── Templates ──────────────────────────────────────────────────────────

templates:
  - name: debian12
    <<: *defaults
    description: "Debian 12 (Bookworm)"
    cloudInitConfig:
      userData:
        packages:
          - qemu-guest-agent
        runcmd:
          - systemctl enable --now qemu-guest-agent
    drives:
      - diskImageName: debian-12-generic-base
        interface: virtio
        strategy: overlay
        cacheType: writeback
        discard: true
      - *ovmf_code
      - *ovmf_vars
    networkInterfaces:
      - type: vde
        hostDevice: /run/vde2/switch.ctl
    sshKeys:
      - name: corvus

  - name: ubuntu24
    <<: *defaults
    description: "Ubuntu 24.04 LTS"
    cloudInitConfig:
      userData:
        packages:
          - qemu-guest-agent
        runcmd:
          - systemctl enable --now qemu-guest-agent
    drives:
      - diskImageName: ubuntu-24.04-server-base
        interface: virtio
        strategy: overlay
        cacheType: writeback
        discard: true
      - *ovmf_code
      - *ovmf_vars
    networkInterfaces:
      - type: vde
        hostDevice: /run/vde2/switch.ctl
    sshKeys:
      - name: corvus

  - name: almalinux10
    <<: *defaults
    description: "AlmaLinux 10"
    drives:
      - diskImageName: almalinux-10-base
        interface: virtio
        strategy: overlay
        cacheType: writeback
        discard: true
      - *ovmf_code
      - *ovmf_vars
    networkInterfaces:
      - type: vde
        hostDevice: /run/vde2/switch.ctl
    sshKeys:
      - name: corvus

  - name: freebsd14
    <<: *defaults
    description: "FreeBSD 14"
    cloudInitConfig:
      userData:
        packages:
          - qemu-guest-agent
        runcmd:
          - sysrc qemu_guest_agent_enable=YES
          - service qemu-guest-agent start
    drives:
      - diskImageName: freebsd-14-base
        interface: virtio
        strategy: overlay
        cacheType: writeback
        discard: true
      - *ovmf_code
      - *ovmf_vars
    networkInterfaces:
      - type: vde
        hostDevice: /run/vde2/switch.ctl
    sshKeys:
      - name: corvus

  - name: gentoo20260412
    <<: *defaults
    description: "Gentoo (2026-04-05 snapshot)"
    drives:
      - diskImageName: gentoo-20260412-base
        interface: virtio
        strategy: overlay
        cacheType: writeback
        discard: true
      - *ovmf_code
      - *ovmf_vars
    networkInterfaces:
      - type: vde
        hostDevice: /run/vde2/switch.ctl
    sshKeys:
      - name: corvus
