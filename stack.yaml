resolver: lts-23.28

packages:
  - .

# ginger (Jinja2 for Haskell) is used by app/gen-python-client to render
# the Python client. Not in LTS-23.28, so we pull the latest from Hackage.
extra-deps:
  - ginger-0.10.6.0@sha256:047825338228f493135781d9a01481033c82ab3b02963e87ff4c5d465be94688,3188

system-ghc: true
install-ghc: false

# NOTE on hpack compatibility: stack 3.7.1 bundles hpack 0.38.1, but
# systems with a newer hpack (0.39+) will rewrite corvus.cabal on every
# `stack build` with their local hpack version. If `stack build` starts
# complaining that corvus.cabal was generated by a newer hpack, either
#   - update your bundled stack-hpack (e.g. `ghcup install stack 3.9.x`),
#   - or rerun hpack once with your system hpack to refresh the header.
# The committed corvus.cabal is kept pinned to the version produced by
# stack 3.7.1's bundled hpack for reproducibility.
