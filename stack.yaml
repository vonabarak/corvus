resolver: lts-23.28

packages:
  - .

# Cap'n Proto Haskell binding. Upstream zenhack/haskell-capnp 0.18.0.0
# is unmaintained since 2023-06; the vendor/ copy carries two changes:
#   1. lib/Capnp/GenHelpers/Rpc.hs: add DuplicateRecordFields pragma
#      so it compiles under GHC 9.8.
#   2. capnp.cabal: bump upper bounds on bytestring/text/primitive/
#      template-haskell/ghc-prim/containers/network/hashable so the
#      package works against Stackage LTS-23.28 without needing
#      `allow-newer: true` (which mis-registers multi-sub-library
#      packages like attoparsec on Stack 3.7.1 — see
#      github.com/commercialhaskell/stack/issues/6447).
#
# lifetimes is also vendored: only its transformers upper bound
# (^>=0.5.6) needs bumping to allow LTS-23.28's transformers-0.6.1.0.
#
# zenhack-prelude has no upper-bound conflicts (only depends on base)
# and is fine straight from Hackage.
extra-deps:
  - ./vendor/haskell-capnp/capnp
  - ./vendor/lifetimes
  - monad-stm-0.1.0.2
  - supervisors-0.2.1.0
  - zenhack-prelude-0.1.1.0

system-ghc: false
install-ghc: false
compiler: ghc-9.8.4

# NOTE on hpack compatibility: stack 3.7.1 bundles hpack 0.38.1, but
# systems with a newer hpack (0.39+) will rewrite corvus.cabal on every
# `stack build` with their local hpack version. If `stack build` starts
# complaining that corvus.cabal was generated by a newer hpack, either
#   - update your bundled stack-hpack (e.g. `ghcup install stack 3.9.x`),
#   - or rerun hpack once with your system hpack to refresh the header.
# The committed corvus.cabal is kept pinned to the version produced by
# stack 3.7.1's bundled hpack for reproducibility.
