pipeline:
  - build:
      name: corvus-test-node
      description: Corvus integration-test target; runs the freshly built daemon over vsock
      template: gentoo-headless

      target:
        name: corvus-test-node
        format: qcow2
        compact: true
        path: BaseImages/Gentoo/
        ifExists: skip

      strategy: overlay

      vm:
        cpuCount: 8
        ramMb: 8192

      shellDefaults:
        preamble: "set -eux"

      provisioners:
        - shell:
            inline: |
              for i in $(seq 1 60); do
                getent hosts distfiles.gentoo.org >/dev/null && break
                sleep 2
              done
              getent hosts distfiles.gentoo.org >/dev/null \
                || { echo "network never came up after 120s" >&2; exit 1; }
            timeoutSec: 130

        - shell:
            inline: |
              mkdir -p /var/cache/distfiles /var/db/repos /var/cache/binpkgs
              mount -oro 192.168.88.1:/data/portage/distfiles /var/cache/distfiles
              mount -oro 192.168.88.1:/data/portage/binpkgs /var/cache/binpkgs 
              mount -oro 192.168.88.1:/var/db/repos /var/db/repos
            timeoutSec: 60

        - shell:
            inline: |
              cat > /etc/portage/package.use/corvus <<'EOF'
              app-emulation/qemu spice usb usbredir virtfs passt vde
              dev-db/postgresql python uuid xml
              EOF

              emerge --noreplace --usepkg \
                net-misc/socat \
                app-emulation/qemu \
                net-misc/vde \
                net-dns/dnsmasq \
                net-firewall/nftables \
                app-emulation/virtiofsd \
                app-cdr/cdrtools \
                sys-firmware/edk2-bin \
                dev-db/postgresql \
                dev-vcs/git \
                net-misc/curl \
                sys-process/htop \
                app-misc/jq
            timeoutSec: 14400
        - shell:
            inline: |
              install -d /etc/systemd/system
              cat > /etc/systemd/system/vde-switch.service <<'EOF'
              [Unit]
              Description=VDE virtual switch for Corvus test VMs
              After=network-pre.target
              Before=network.target
              Wants=network-pre.target

              [Service]
              Type=forking
              ExecStartPre=/bin/mkdir -p /run/vde2
              ExecStart=/usr/bin/vde_switch \
                  --sock /run/vde2/switch.ctl \
                  --mgmt /run/vde2/switch.mgmt \
                  -tap vde0 \
                  -m 666 \
                  -group kvm \
                  --daemon \
                  --pidfile /run/vde2/vde_switch.pid
              PIDFile=/run/vde2/vde_switch.pid
              Restart=on-failure

              [Install]
              WantedBy=multi-user.target
              EOF
              systemctl enable vde-switch.service

              install -d /etc/systemd/network
              cat > /etc/systemd/network/30-vde0.network <<'EOF'
              [Match]
              Name=vde0

              [Network]
              Address=192.168.92.1/24
              ConfigureWithoutCarrier=yes
              EOF

              install -d /etc/sysctl.d
              cat > /etc/sysctl.d/30-corvus-vde-forward.conf <<'EOF'
              net.ipv4.ip_forward = 1
              EOF

              # Gentoo's nftables.service (sys-firewall/nftables-1.x) loads
              # /etc/nftables/rules/main.nft and ships ConditionPathExists=
              # on it, so the legacy /etc/nftables.conf path is silently
              # skipped at boot (the symptom was: bake VMs got no NAT,
              # apt-get hung, QGA never pinged).
              install -d -m 0755 /etc/nftables/rules
              cat > /etc/nftables/rules/main.nft <<'EOF'
              flush ruleset

              table ip nat {
                  chain postrouting {
                      type nat hook postrouting priority srcnat
                      policy accept
                      ip saddr 192.168.92.0/24 oifname != "vde0" masquerade
                  }
              }
              EOF
              chmod 0644 /etc/nftables/rules/main.nft

              cat > /etc/dnsmasq.conf <<'EOF'
              interface=vde0
              bind-dynamic
              dhcp-range=192.168.92.10,192.168.92.200,12h
              dhcp-option=option:router,192.168.92.1
              dhcp-option=option:dns-server,192.168.92.1
              domain-needed
              bogus-priv
              EOF

              install -d /etc/systemd/system/dnsmasq.service.d
              cat > /etc/systemd/system/dnsmasq.service.d/wait-vde.conf <<'EOF'
              [Unit]
              After=vde-switch.service systemd-networkd.service
              Wants=systemd-networkd.service
              EOF

              systemctl enable nftables.service dnsmasq.service
            timeoutSec: 60

        # Bring Postgres up; create the `corvus` SUPERUSER + database
        # that the inner daemon will use. Mirrors what gentoo-test.yml's
        # 2nd-stage overlay already does, but idempotent so it works
        # whether or not the parent image already did it.
        - shell:
            inline: |
              eselect postgresql set 18 || true
              if [ ! -d /var/lib/postgresql/18/data ]; then
                emerge --config dev-db/postgresql:18 || true
              fi
              systemctl enable postgresql-18.service
              systemctl start postgresql-18.service
              for i in $(seq 1 30); do
                sudo -u postgres psql -c '\q' 2>/dev/null && break
                sleep 1
              done
              sudo -u postgres psql -v ON_ERROR_STOP=1 <<'SQL' || true
              CREATE USER corvus SUPERUSER;
              CREATE DATABASE corvus OWNER corvus;
              SQL
            timeoutSec: 600

        # Mount points for the virtiofs shares the harness wires up at
        # `crv vm create` time. The systemd .mount unit's filename must
        # match `systemd-escape -p <path>`; for `/opt/corvus/bin`
        # that's `opt-corvus-bin.mount` (no literal hyphens in the
        # path → no `\x2d` escaping needed).
        - shell:
            inline: |
              install -d -m 0755 /opt/corvus/bin
              install -d -m 0755 /mnt/corvus
              install -d -m 0755 /home/corvus/VMs/BaseImages

              # tmpfiles.d entry for the BaseImages overlay (see
              # home-corvus-VMs-BaseImages.mount). /run is tmpfs, so
              # the lower mount point + upper/work dirs need to be
              # re-created every boot. corvus:corvus on upper+work
              # so the unprivileged daemon can land writes there.
              install -d -m 0755 /etc/tmpfiles.d
              cat > /etc/tmpfiles.d/corvus-baseimages.conf <<'EOF'
              d /run/baseimages       0755 root   root   -
              d /run/baseimages/lower 0755 root   root   -
              d /run/baseimages/upper 0755 corvus corvus -
              d /run/baseimages/work  0700 corvus corvus -
              EOF
              chmod 0644 /etc/tmpfiles.d/corvus-baseimages.conf
            timeoutSec: 10

        # systemd unit files. We use `file:` provisioners so the units
        # are version-controlled in yaml/corvus-test-node/systemd/.
        - file:
            from: ./systemd/opt-corvus-bin.mount
            to: /etc/systemd/system/opt-corvus-bin.mount
            mode: "0644"
        - file:
            from: ./systemd/mnt-corvus.mount
            to: /etc/systemd/system/mnt-corvus.mount
            mode: "0644"
        - file:
            from: ./systemd/run-baseimages-lower.mount
            to: /etc/systemd/system/run-baseimages-lower.mount
            mode: "0644"
        - file:
            from: ./systemd/home-corvus-VMs-BaseImages.mount
            to: /etc/systemd/system/home-corvus-VMs-BaseImages.mount
            mode: "0644"
        - file:
            from: ./systemd/corvus-test.service
            to: /etc/systemd/system/corvus-test.service
            mode: "0644"
        - file:
            from: ./systemd/corvus-netd.service
            to: /etc/systemd/system/corvus-netd.service
            mode: "0644"
        - file:
            from: ./systemd/corvus-nodeagent.service
            to: /etc/systemd/system/corvus-nodeagent.service
            mode: "0644"
        - file:
            from: ./systemd/corvus-tcp-relay.service
            to: /etc/systemd/system/corvus-tcp-relay.service
            mode: "0644"

        - shell:
            inline: |
              systemctl daemon-reload
              # The mount units are pulled in by their respective service
              # units (RequiresMountsFor=); we still enable them so a
              # `systemctl status` lists them.
              systemctl enable opt-corvus-bin.mount
              systemctl enable mnt-corvus.mount
              # BaseImages: ro virtiofs lower + tmpfs upper overlay,
              # so the inner daemon can delete/overwrite registered
              # images without touching the host's tree.
              systemctl enable run-baseimages-lower.mount
              systemctl enable home-corvus-VMs-BaseImages.mount
              # corvus-netd.service runs the privileged network agent
              # as root; the unprivileged corvus daemon dials it over
              # 127.0.0.1:9877.
              systemctl enable corvus-netd.service
              # corvus-nodeagent.service runs the per-host node agent
              # (QEMU/virtiofsd supervision, disk I/O, console buffers)
              # as root; the unprivileged corvus daemon dials it over
              # 127.0.0.1:9878. Phase 1 stub — the binary runs but no
              # handlers route through it yet.
              systemctl enable corvus-nodeagent.service
              # corvus-test.service starts the inner daemon as soon as
              # /opt/corvus/bin is mounted (i.e. the harness's virtiofs
              # share is attached), Postgres is up, and the netd agent
              # is reachable.
              systemctl enable corvus-test.service
              # corvus-tcp-relay.service translates host vsock connects
              # to the daemon's TCP listener.
              systemctl enable corvus-tcp-relay.service
              # sshd accepts incoming SSH (including over VSOCK via
              # systemd's built-in socket-activated proxy); the corvus
              # user's authorized_keys is set up below.
              systemctl enable sshd.service
            timeoutSec: 30

        # ── Debug aids for SSH-in inspection ─────────────────────────────
        # When a test leaks a node for inspection (the harness prints a
        # `for n in <name>; do crv vm delete ...` hint), SSHing in
        # should put a usable `crv` and a few diagnostic shortcuts
        # within reach.
        - shell:
            inline: |
              install -d -m 0755 /etc/profile.d
              cat > /etc/profile.d/50-corvus.sh <<'EOF'
              # Test-node debug aliases — see yaml/corvus-test-node/

              # Put the host-shared crv on PATH so tab-completion can
              # invoke it bare (alias expansion is off inside the
              # completion function). The daemon listens on TCP via
              # the vsock-to-TCP relay; CORVUS_HOST / CORVUS_PORT let
              # the entity-name completer (Corvus.Client.Completion)
              # reach it without `--tcp` on the inner call.
              if [ -d /opt/corvus/bin ]; then
                case ":$PATH:" in
                  *:/opt/corvus/bin:*) ;;
                  *) PATH="/opt/corvus/bin:$PATH" ;;
                esac
                export PATH
                export CORVUS_HOST=127.0.0.1
                export CORVUS_PORT=9876
              fi

              alias crv='/opt/corvus/bin/crv --tcp'
              alias crv-log='journalctl -u corvus-test -f --since "5 min ago"'
              alias crv-status='systemctl status --no-pager corvus-test'
              alias crv-psql='psql -U corvus corvus'
              # Show every corvus-spawned process (qemu, virtiofsd, dnsmasq).
              alias crv-procs='pgrep -af "[c]orvus|[q]emu-system|[v]irtiofsd|[d]nsmasq" | sort'

              # Tab-completion for `crv`. Regenerated each login so
              # it tracks whichever binary is mounted at the time
              # (the virtiofs share is the developer's stack build).
              if [ -x /opt/corvus/bin/crv ]; then
                eval "$(/opt/corvus/bin/crv completion bash 2>/dev/null)"
              fi
              EOF
              chmod 0644 /etc/profile.d/50-corvus.sh

              cat > /etc/motd <<'EOF'
              ── Corvus integration-test outer node ───────────────────────
                crv               — host's crv pointed at the inner daemon
                crv-log           — tail the inner daemon's journal
                crv-status        — service state
                crv-psql          — connect to the inner Postgres
                crv-procs         — list daemon-spawned helpers
                sudo journalctl -u virtiofsd@\* -f   — virtiofs daemon logs
              EOF
            timeoutSec: 10

        # ── SSH access for the host-side test harness ────────────────────
        # The harness drives the inner Alpine VM via a two-leg SSH
        # tunnel: host → outer Gentoo VM (this image) → inner Alpine VM.
        # Both legs use the same keypair in integration_tests/keys/, so
        # one authorized_keys file in /home/corvus is enough.
        - shell:
            inline: |
              if ! id corvus >/dev/null 2>&1; then
                useradd -m -s /bin/bash -G wheel,kvm corvus
              else
                usermod -aG kvm corvus
              fi
              install -d -m 0700 -o corvus -g corvus /home/corvus/.ssh
              # /home/corvus/VMs is the daemon's basePath (it runs
              # as the corvus user, so $HOME/VMs resolves here).
              # BaseImages is the virtiofs mount point for the
              # harness's host-side ~/VMs/BaseImages share.
              install -d -m 0755 -o corvus -g corvus /home/corvus/VMs
              install -d -m 0755 -o corvus -g corvus /home/corvus/VMs/BaseImages
              # Allow passwordless sudo for the wheel group so tests can
              # exercise root-only paths without prompting.
              install -d -m 0750 /etc/sudoers.d
              echo '%wheel ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/wheel-nopasswd
              chmod 0440 /etc/sudoers.d/wheel-nopasswd
            timeoutSec: 30

        # Bake the harness's public key into the corvus user's
        # authorized_keys. Path is relative to this YAML's directory;
        # `crv build`'s client-side preprocessor handles `..` segments
        # (src/Corvus/Client/Commands/Build.hs:readFromFile).
        - file:
            from: ../../integration_tests/keys/corvus-test-key.pub
            to: /home/corvus/.ssh/authorized_keys
            mode: "0600"

        - shell:
            inline: |
              chown corvus:corvus /home/corvus/.ssh/authorized_keys
            timeoutSec: 10

        # ── Strip cloud-init from the boot path ──────────────────────────
        # The outer VM doesn't need cloud-init at apply time — the SSH
        # key is baked into the image above. Masking the units saves a
        # few seconds of boot per test class (cloud-init's "find a
        # datasource and time out" path is the dominant cost when no
        # NoCloud ISO is attached).
        - shell:
            inline: |
              systemctl mask \
                cloud-init.target \
                cloud-init-main.service \
                cloud-init-local.service \
                cloud-config.service \
                cloud-final.service \
                cloud-init-hotplugd.socket
            timeoutSec: 30

        # Nested-KVM sanity check on the built image. If the kernel
        # config lacks nested-KVM, fail loudly here so the failure is
        # attributable to the image, not to an obscure test crash.
        - shell:
            inline: |
              cfg=/boot/config-$(uname -r)
              test -f "$cfg" || { echo "kernel config not found at $cfg" >&2; exit 1; }
              grep -qE '^CONFIG_KVM_INTEL=[ym]|^CONFIG_KVM_AMD=[ym]' "$cfg" \
                || { echo "kernel lacks KVM_INTEL/KVM_AMD" >&2; exit 1; }
              # Nested KVM is enabled at runtime via module parameter
              # (kvm_intel.nested=1 / kvm_amd.nested=1) on most kernels;
              # the build-time check above is necessary, not sufficient.
              # The harness re-checks the runtime parameter on the host
              # before the session starts.
            timeoutSec: 30

        # Provenance file the harness reads to verify it's running the
        # right image.
        - shell:
            inline: |
              {
                echo "image: corvus-test-node"
                echo "built: $(date -Iseconds)"
                echo "kernel: $(uname -r)"
                qemu-system-x86_64 --version | head -1
                psql --version
                socat -V 2>&1 | head -1
              } > /etc/corvus-image-info
              cat /etc/corvus-image-info
            timeoutSec: 30

      cleanup: onSuccess

  # Register a runtime template that instantiates a one-off VM from
  # the freshly baked `corvus-test-node` image. Intended for manual
  # poking — the integration-test harness writes its own apply YAML
  # inline (so it can attach per-class shared dirs) and doesn't
  # reuse this template.
  #
  # `make test-node-vm` instantiates this template into a named VM
  # and attaches `stack path --local-install-root`/bin/ over
  # virtiofs at the `corvus_host` tag, so the image's
  # opt-corvus-bin.mount picks up the developer's freshly built
  # binaries at /opt/corvus/bin without a rebake.
  - apply:
      ifExists: skip
      templates:
        - name: corvus-test-node
          description: "Corvus integration-test node — instantiate via `make test-node-vm` for hands-on inspection of the daemon+netd+nodeagent stack inside the same image the test harness uses"
          cpuCount: 4
          # 16 GiB so the dev VM can host a real-sized nested VM
          # (multi-os/gentoo-headless defaults are 4-8 GiB) plus the
          # inner daemon, Postgres, VDE/dnsmasq, and headroom. The
          # original 4 GiB was sized for the integration-test
          # footprint, not for manual nested-VM testing.
          ramMb: 16384
          guestAgent: true
          headless: true
          drives:
            - diskImageName: corvus-test-node
              interface: virtio
              strategy: overlay
              cacheType: writeback
              discard: true
          networkInterfaces:
            - type: user