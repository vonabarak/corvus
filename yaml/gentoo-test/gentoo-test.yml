pipeline:
  - build:
      name: gentoo-corvus-test
      description: Gentoo image preloaded with everything Corvus builds against
      template: gentoo-headless

      target:
        name: gentoo-corvus-test
        compact: true

      strategy: overlay

      vm:
        cpuCount: 8
        ramMb: 8192

      shellDefaults:
        preamble: "set -eux"

      provisioners:
        - shell:
            inline: |
              for i in $(seq 1 60); do
                getent hosts distfiles.gentoo.org >/dev/null && break
                sleep 2
              done
              getent hosts distfiles.gentoo.org >/dev/null \
                || { echo "network never came up after 120s" >&2; exit 1; }
            timeoutSec: 130

        - shell:
            inline: |
              mkdir -p /var/cache/distfiles /var/db/repos /mnt/corvus

              cat >> /etc/fstab <<'EOF'
              192.168.88.1:/data/portage/distfiles /var/cache/distfiles nfs rw 0 0
              192.168.88.1:/data/portage/binpkgs /var/cache/binpkgs nfs ro 0 0
              192.168.88.1:/var/db/repos /var/db/repos nfs ro 0 0
              192.168.88.1:/home/bobr/Work/corvus /mnt/corvus nfs rw 0 0
              EOF

              systemctl daemon-reload
              mount -a
            timeoutSec: 60

        - shell:
            inline: |
              cat > /etc/portage/package.use/corvus <<'EOF'
              app-emulation/qemu spice usb usbredir virtfs passt vde
              EOF
              
              cat > /etc/portage/package.accept_keywords/corvus <<'EOF'
              app-emulation/corvus **
              dev-haskell/* ~amd64
              dev-lang/ghc ~amd64
              dev-util/ghcup-bin ~amd64
              EOF

              cat > /etc/portage/repos.conf <<'EOF'
              [vonabarak]
              location = /var/db/repos/vonabarak
              sync-type = git
              sync-uri = https://github.com/vonabarak/gentoo.git

              [haskell]
              location = /var/db/repos/haskell
              sync-type = git
              sync-uri = https://github.com/gentoo-haskell/gentoo-haskell.git
              EOF
            timeoutSec: 60

        - shell:
            inline: |
              emerge --noreplace --usepkg \
                app-emulation/qemu \
                net-misc/vde \
                net-dns/dnsmasq \
                net-firewall/nftables \
                app-emulation/virtiofsd \
                app-cdr/cdrtools \
                sys-firmware/edk2-bin \
                dev-db/postgresql \
                dev-vcs/git \
                net-misc/curl \
                app-misc/jq \
                dev-util/ghcup-bin \
                app-editors/vim \
                app-emulation/corvus --onlydeps
            timeoutSec: 14400

        - shell:
            inline: |
              eselect postgresql set 18 || true
              emerge --config dev-db/postgresql:18 || true
              systemctl enable postgresql-18.service
              
              systemctl start postgresql-18.service
              for i in $(seq 1 30); do
                sudo -u postgres psql -c '\q' 2>/dev/null && break
                sleep 1
              done
              
              sudo -u postgres psql -v ON_ERROR_STOP=1 <<'SQL'
              CREATE USER corvus SUPERUSER;
              CREATE DATABASE corvus OWNER corvus;
              SQL
            timeoutSec: 300

        - shell:
            inline: |
              install -d /etc/systemd/system
              cat > /etc/systemd/system/vde-switch.service <<'EOF'
              [Unit]
              Description=VDE virtual switch for Corvus test VMs
              After=network-pre.target
              Before=network.target
              Wants=network-pre.target

              [Service]
              Type=forking
              ExecStartPre=/bin/mkdir -p /run/vde2
              ExecStart=/usr/bin/vde_switch \
                  --sock /run/vde2/switch.ctl \
                  --mgmt /run/vde2/switch.mgmt \
                  -tap vde0 \
                  -m 666 \
                  -group kvm \
                  --daemon \
                  --pidfile /run/vde2/vde_switch.pid
              PIDFile=/run/vde2/vde_switch.pid
              Restart=on-failure

              [Install]
              WantedBy=multi-user.target
              EOF
              systemctl enable vde-switch.service

              install -d /etc/systemd/network
              cat > /etc/systemd/network/30-vde0.network <<'EOF'
              [Match]
              Name=vde0

              [Network]
              Address=192.168.92.1/24
              ConfigureWithoutCarrier=yes
              EOF

              install -d /etc/sysctl.d
              cat > /etc/sysctl.d/30-corvus-vde-forward.conf <<'EOF'
              net.ipv4.ip_forward = 1
              EOF

              cat > /etc/nftables.conf <<'EOF'
              #!/usr/sbin/nft -f
              flush ruleset

              table ip nat {
                  chain postrouting {
                      type nat hook postrouting priority srcnat
                      policy accept
                      ip saddr 192.168.92.0/24 oifname != "vde0" masquerade
                  }
              }
              EOF

              cat > /etc/dnsmasq.conf <<'EOF'
              interface=vde0
              bind-dynamic
              dhcp-range=192.168.92.10,192.168.92.200,12h
              dhcp-option=option:router,192.168.92.1
              dhcp-option=option:dns-server,192.168.92.1
              domain-needed
              bogus-priv
              EOF

              install -d /etc/systemd/system/dnsmasq.service.d
              cat > /etc/systemd/system/dnsmasq.service.d/wait-vde.conf <<'EOF'
              [Unit]
              After=vde-switch.service systemd-networkd.service
              Wants=systemd-networkd.service
              EOF

              systemctl enable nftables.service dnsmasq.service
            timeoutSec: 60

        - shell:
            inline: |
              install -d /etc/cloud/cloud.cfg.d
              cat > /etc/cloud/cloud.cfg.d/91_corvus_kvm.cfg <<'EOF'
              runcmd:
                - getent group kvm >/dev/null && id corvus >/dev/null 2>&1 && usermod -aG kvm corvus || true
              EOF
            timeoutSec: 30

        - shell:
            inline: |
              {
                echo "image: gentoo-corvus-test"
                echo "baked: $(date -Iseconds)"
                echo "kernel: $(uname -r)"
                ghc --version
                qemu-system-x86_64 --version | head -1
                psql --version
                vde_switch --version 2>&1 | head -1 || true
              } > /etc/corvus-test-info
              cat /etc/corvus-test-info
            timeoutSec: 60

      cleanup: onSuccess

  - apply:
      ifExists: skip
      vms:
        - name: gentoo-corvus-test
          cpuCount: 8
          ramMb: 8192
          cloudInit: true
          guestAgent: true
          headless: true
          description: "Test VM for Corvus"
          drives:
            - disk: gentoo-corvus-test
              interface: virtio
              cacheType: writeback
              discard: true
          networkInterfaces:
            - type: vde
              hostDevice: /run/vde2/switch.ctl
          sshKeys:
            - corvus