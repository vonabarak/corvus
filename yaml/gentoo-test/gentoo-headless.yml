# Build-time variables. `gentoo_base_cloud_url` is declared without
# a default (required) because the upstream Gentoo autobuild filename
# rotates every few days; pass the current URL via
# `crv build --var gentoo_base_cloud_url=...` or use the Makefile,
# which discovers the latest filename and threads it through for you.
vars:
  gentoo_base_cloud_url: ~

pipeline:
  # ─────────────────────────────────────────────────────────────────
  # Stage 0: import the upstream Gentoo cloud-init image.
  # ─────────────────────────────────────────────────────────────────
  # Disks: skip-if-exists so re-baking doesn't re-download the
  # ~8 GB cloud-init Gentoo image every time.
  - apply:
      ifExists: skip
      disks:
        - name: gentoo-base-cloud
          import: "${gentoo_base_cloud_url}"
          format: qcow2
          path: BaseImages/Gentoo/

  # Templates: overwrite-on-exists so edits to the bake-VM
  # template's cloud-init userData (or any other template field)
  # actually propagate on the NEXT bake. Without this, the
  # template's DB row stays at whatever the first apply wrote
  # and `crv build` just re-instantiates the stale userData into
  # every fresh bake VM, regardless of YAML edits.
  - apply:
      ifExists: skip   # outer daemon predates ifExists: overwrite; manually `crv template delete <name>` to re-apply edits
      templates:
        - name: gentoo-cloud
          cpuCount: 8
          ramMb: 8192
          cloudInit: true
          guestAgent: true
          description: "Gentoo cloud-init bake host (stage 1)"
          cloudInitConfig:
            userData:
              bootcmd:
                - [ mkdir, -p, /var/db/repos ]
                - [ sh, -c, "mountpoint -q /var/db/repos || mount -t virtiofs repos /var/db/repos" ]
                # /var/cache/distfiles is an overlayfs: the host's
                # distfiles cache is the read-only lower layer, an
                # ephemeral upperdir absorbs any new tarballs portage
                # fetches during the bake. The host's distfiles stay
                # untouched (no virtiofsd chown shenanigans, no UID
                # mismatch EPERMs) and the bake VM still gets the full
                # cache benefit for re-runs.
                - [ mkdir, -p, /var/cache/distfiles, /run/distfiles-host, /var/tmp/distfiles-upper, /var/tmp/distfiles-work ]
                - [ sh, -c, "mountpoint -q /run/distfiles-host || mount -t virtiofs distfiles /run/distfiles-host" ]
                - [ sh, -c, "mountpoint -q /var/cache/distfiles || mount -t overlay overlay -o lowerdir=/run/distfiles-host,upperdir=/var/tmp/distfiles-upper,workdir=/var/tmp/distfiles-work /var/cache/distfiles" ]
              # /var/cache/binpkgs is bind-mounted via NFS so portage
              # can WRITE binpkgs back to the host (FEATURES=buildpkg
              # in the bake VM's make.conf turns this on). virtiofsd
              # can't fake foreign UIDs from an unprivileged host
              # process, so writes through the virtiofs share would
              # EPERM; the host's NFS export uses
              # all_squash,anonuid=1000 to land every write as bobr
              # regardless of which UID the guest's portage uses.
              #
              # cloud-init's `mounts:` module doesn't work here:
              # gentoo-cloud doesn't ship net-fs/nfs-utils, so neither
              # mount.nfs nor mount.nfs4 exists at cc_mounts time, and
              # util-linux's built-in NFS path through fsconfig() then
              # fails with "NFS: mount program didn't pass remote
              # address". Install nfs-utils first via runcmd, then
              # mount + append to fstab manually.
              runcmd:
                - emerge --getbinpkg --usepkg --binpkg-respect-use=y --quiet-build net-fs/nfs-utils
                - mkdir -p /var/cache/binpkgs
                - mount -t nfs4 -o rw,vers=4.2 192.168.72.1:/data/portage/binpkgs_corvus /var/cache/binpkgs
                - sh -c "echo '192.168.72.1:/data/portage/binpkgs_corvus /var/cache/binpkgs nfs4 rw,_netdev,vers=4.2 0 0' >> /etc/fstab"
                # Disable binpkg signature checks BEFORE the next
                # emerge picks anything off the just-mounted local
                # binhost. The host's binhost is unsigned (host
                # portage doesn't run with FEATURES=binpkg-signing),
                # but the 23.0 profile defaults to
                # binpkg-request-signature — qemu-guest-agent's
                # binpkg would be rejected.
                - sh -c 'printf "\nFEATURES=\"\${FEATURES} -binpkg-request-signature binpkg-ignore-signature\"\nGPG_VERIFY_USER_DROP=\"\"\nGPG_VERIFY_GROUP_DROP=\"\"\n" >> /etc/portage/make.conf'
                - emerge --getbinpkg --usepkg --binpkg-respect-use=y --quiet-build app-emulation/qemu-guest-agent
                - systemctl enable --now qemu-guest-agent.service
          sharedDirs:
            - path: /var/db/repos
              tag: repos
              readOnly: true
            - path: /data/portage/distfiles
              tag: distfiles
              readOnly: true
          drives:
            - diskImageName: gentoo-base-cloud
              interface: virtio
              strategy: overlay
              cacheType: writeback
              discard: true
            - diskImageName: ovmf-code
              interface: pflash
              readOnly: true
              strategy: direct
            - diskImageName: ovmf-vars
              interface: pflash
              strategy: clone
          networkInterfaces:
            - network: corvus
          sshKeys:
            - name: corvus

  # ─────────────────────────────────────────────────────────────────
  # Stage 1: bake gentoo-builder — gentoo-base-cloud + builder tools.
  # ─────────────────────────────────────────────────────────────────
  # Overlay strategy: the bake VM root IS the artifact. Provisioners
  # install nfs-utils + qga (via the gentoo-cloud template's runcmd
  # at first boot) and then gentoo-sources + disk/bootloader utils
  # via the shell provisioner below. The flattened result is the
  # `gentoo-builder` disk used as the bake-VM root for stage 2.
  - build:
      name: gentoo-builder
      description: Gentoo bake host with builder tools pre-installed
      template: gentoo-cloud

      target:
        format: qcow2
        # gentoo-base-cloud is ~3 GB virtual; +gentoo-sources +grub
        # +utils pushes the overlay well past that, so size up to
        # 12 GB. qcow2 stays sparse on disk.
        sizeGb: 12
        path: BaseImages/Gentoo/
        compact: true
        ifExists: skip

      strategy: overlay

      vm:
        cpuCount: 8
        ramMb: 8192

      shellDefaults:
        preamble: "set -eux"

      provisioners:
        # 1) Wait for DNS, configure portage knobs, run getuto, then
        #    @world update + emerge builder tools. Identical content
        #    to the prior single-stage YAML's step 1, but the result
        #    is captured in the gentoo-builder artifact so subsequent
        #    bakes don't re-emerge any of this.
        - shell:
            inline: |
              # Wait until outbound DNS works before touching the network.
              for i in $(seq 1 60); do
                getent hosts distfiles.gentoo.org >/dev/null && break
                sleep 2
              done
              getent hosts distfiles.gentoo.org >/dev/null \
                || { echo "network never came up after 120s" >&2; exit 1; }

              mkdir -p /etc/portage/package.use
              cat > /etc/portage/package.use/grub <<'EOF'
              sys-boot/grub grub_platforms_pc -mount -nls -fonts -themes
              EOF

              grep -q 'FEATURES=.*getbinpkg' /etc/portage/make.conf 2>/dev/null || cat >> /etc/portage/make.conf <<'EOF'

              # The host's local binhost (shared as /var/cache/binpkgs)
              # isn't uniformly signed — host's portage doesn't run
              # FEATURES=binpkg-signing, but some old per-package
              # binpkgs still carry .sig files from a prior signing
              # run. The 23.0 profile defaults to
              # binpkg-request-signature, which rejects every
              # unsigned binpkg. And `-binpkg-request-signature`
              # alone isn't enough either: gpkg's verifier still
              # routes through VERIFY whenever a .sig is present in
              # the archive (see gpkg.py:_verify_binpkg, condition
              # `request_signature or signature_exist`).
              # `binpkg-ignore-signature` short-circuits verification
              # outright. GPG_VERIFY_USER_DROP / GPG_VERIFY_GROUP_DROP
              # left empty skip the privilege drop to nobody:nogroup
              # that gpkg.py:checksum_helper would otherwise do
              # before any FEATURES check — same crash baselayout
              # has shipped without a 'nogroup' group for years.
              #
              # --binpkg-changed-deps=n forces portage to use binpkgs
              # even when their recorded dep manifest has drifted from
              # the live tree's. Without it, otherwise-fine binpkgs
              # (kbd, shadow, util-linux, binutils, e2fsprogs, procps,
              # pam, portage, python, debugedit, charset-normalizer,
              # elfutils, curl, libarchive, libcap, man-db, openssh,
              # …) silently fall back to source build, which is the
              # bulk of the bake's wall-clock cost.
              FEATURES="${FEATURES} buildpkg getbinpkg parallel-fetch -binpkg-request-signature binpkg-ignore-signature"
              EMERGE_DEFAULT_OPTS="${EMERGE_DEFAULT_OPTS} --getbinpkg --usepkg --binpkg-respect-use=y --binpkg-changed-deps=n"
              ACCEPT_LICENSE="*"
              GPG_VERIFY_USER_DROP=""
              GPG_VERIFY_GROUP_DROP=""
              EOF

              getuto || emerge -1q app-portage/getuto || true
              getuto || true

              # Disk + bootloader tools: needed by stage 2's
              # from-scratch provisioners. Baking them here means the
              # stage-2 bake VM has them ready at first boot.
              emerge --noreplace -vg \
                sys-apps/gptfdisk \
                sys-block/parted \
                sys-fs/e2fsprogs \
                sys-boot/grub:2

              # Kernel sources: stage 2's kernel-build step still
              # configures + builds + installs the kernel into the
              # sysroot, but it relies on /usr/src/linux-*-gentoo*
              # being present on the bake VM. Bake it in here so
              # stage 2 doesn't pay the gentoo-sources emerge cost.
              emerge --noreplace -vg sys-kernel/gentoo-sources

              # Bring the bake VM's @world in line with the current
              # portage tree (host-mounted). Equivalent to the @world
              # update that webrsync used to imply — needed so the bake
              # VM's installed BDEPENDs (setuptools, packaging, …)
              # match the PYTHON_TARGETS the tree expects right now.
              # Without it, `emerge @system` into the sysroot in
              # stage 2 hits slot conflicts because an ebuild's
              # BDEPEND wants e.g. setuptools[python3_14] while the
              # bake VM has setuptools[python3_13] from the cloud-init
              # base image.
              #
              # Two-pass with --keep-going=y is the canonical workaround
              # for the portage self-upgrade bug across Python target
              # transitions: the OLD portage (python3.13) crashes in
              # `_post_merge_sync` with a ModuleNotFoundError because
              # the in-flight unmerge has already removed its
              # `_SyncfsProcess` module while the merge of the new
              # portage is still running. The crash happens AFTER the
              # new portage's files are on disk, so a second pass —
              # this time using the new python3.14 portage — completes
              # cleanly.
              emerge --update --deep --newuse --getbinpkg --usepkg \
                --binpkg-respect-use=y --quiet-build --keep-going=y \
                -v @world || \
              emerge --update --deep --newuse --getbinpkg --usepkg \
                --binpkg-respect-use=y --quiet-build --keep-going=y \
                -v @world

              cat > /etc/corvus-image-info <<EOF
              image: gentoo-builder
              built: $(date -Iseconds)
              EOF
            timeoutSec: 7200

      cleanup: onSuccess

  # ─────────────────────────────────────────────────────────────────
  # Bake-VM template for stage 2. Drives = gentoo-builder + OVMF.
  # Builder tools already baked in (stage 1), so the userData's
  # job here is JUST the bind-mounts: virtiofs for repos + distfiles
  # overlay, NFS for binpkgs, plus the make.conf binpkg-signature
  # override. No package emerges in the runcmd.
  # ─────────────────────────────────────────────────────────────────
  - apply:
      ifExists: skip   # outer daemon predates ifExists: overwrite; manually `crv template delete <name>` to re-apply edits
      templates:
        - name: gentoo-builder-bake
          cpuCount: 8
          ramMb: 8192
          cloudInit: true
          guestAgent: true
          description: "Gentoo builder bake VM (stage 2's bake host)"
          cloudInitConfig:
            userData:
              bootcmd:
                - [ mkdir, -p, /var/db/repos ]
                - [ sh, -c, "mountpoint -q /var/db/repos || mount -t virtiofs repos /var/db/repos" ]
                - [ mkdir, -p, /var/cache/distfiles, /run/distfiles-host, /var/tmp/distfiles-upper, /var/tmp/distfiles-work ]
                - [ sh, -c, "mountpoint -q /run/distfiles-host || mount -t virtiofs distfiles /run/distfiles-host" ]
                - [ sh, -c, "mountpoint -q /var/cache/distfiles || mount -t overlay overlay -o lowerdir=/run/distfiles-host,upperdir=/var/tmp/distfiles-upper,workdir=/var/tmp/distfiles-work /var/cache/distfiles" ]
              runcmd:
                # nfs-utils + qga already baked into gentoo-builder
                # (stage 1), so no emerge here — just the NFS mount.
                - mkdir -p /var/cache/binpkgs
                - mount -t nfs4 -o rw,vers=4.2 192.168.72.1:/data/portage/binpkgs_corvus /var/cache/binpkgs
                - sh -c "echo '192.168.72.1:/data/portage/binpkgs_corvus /var/cache/binpkgs nfs4 rw,_netdev,vers=4.2 0 0' >> /etc/fstab"
                # make.conf binpkg-signature override is already in
                # /etc/portage/make.conf (carried over from stage 1's
                # bake, which appended it before any @world update).
                # No-op here.
          sharedDirs:
            - path: /var/db/repos
              tag: repos
              readOnly: true
            - path: /data/portage/distfiles
              tag: distfiles
              readOnly: true
          drives:
            - diskImageName: gentoo-builder
              interface: virtio
              strategy: overlay
              cacheType: writeback
              discard: true
            - diskImageName: ovmf-code
              interface: pflash
              readOnly: true
              strategy: direct
            - diskImageName: ovmf-vars
              interface: pflash
              strategy: clone
          networkInterfaces:
            - network: corvus
          sshKeys:
            - name: corvus

  # ─────────────────────────────────────────────────────────────────
  # Stage 2: bake gentoo-base-headless — a from-scratch headless
  # Gentoo with NO cloud-init in the output disk.
  # ─────────────────────────────────────────────────────────────────
  # Same provisioner skeleton as the prior single-stage YAML's
  # build, with three deletions: (a) step 1's @world update + tool
  # emerges (done in stage 1); (b) the gentoo-sources emerge in
  # step 5 (also stage 1); (c) the app-emulation/cloud-init emerge
  # in step 6 + the cloud-init systemctl enables + the NoCloud
  # cfg in step 8 (the headless variant is meant to have no
  # cloud-init at all — see stage 3 for the cloud-init variant).
  - build:
      name: gentoo-base-headless
      description: Minimal headless Gentoo with custom kernel (BIOS+GPT, ext4) — no cloud-init
      template: gentoo-builder-bake

      target:
        format: qcow2
        sizeGb: 20
        path: BaseImages/Gentoo/
        compact: true
        ifExists: skip

      strategy: from-scratch

      vm:
        cpuCount: 8
        ramMb: 8192

      shellDefaults:
        preamble: "set -eux"
        env:
          SYSROOT: /mnt/sysroot
          DEV: /dev/vdb

      provisioners:
        # 1) Bake-host DNS sanity check. Builder tools are already
        #    in the bake VM (stage 1), so nothing else to do here.
        - shell:
            env:
              SYSROOT: /
            inline: |
              for i in $(seq 1 60); do
                getent hosts distfiles.gentoo.org >/dev/null && break
                sleep 2
              done
              getent hosts distfiles.gentoo.org >/dev/null \
                || { echo "network never came up after 120s" >&2; exit 1; }
            timeoutSec: 130

        # 2) Copy kernel config onto the bake VM.
        #    Step 5 copies it to $SYSROOT/usr/src/linux/.config and
        #    builds gentoo-sources against it.
        - file:
            from: ./gentoo-kernel
            to: /tmp/gentoo-kernel-config
            mode: "0644"

        # 3) Partition the empty target disk. /dev/vdb is the second
        #    drive — the bake VM's bootdisk is /dev/vda. GPT layout with
        #    a 1 MiB BIOS-boot partition (type ef02 for GRUB stage 1.5)
        #    and a single ext4 root.
        - shell:
            inline: |
              wipefs -a "$DEV"
              sgdisk --zap-all "$DEV"
              sgdisk -n 1:0:+1M  -t 1:ef02 -c 1:bios "$DEV"
              sgdisk -n 2:0:0    -t 2:8300 -c 2:root "$DEV"
              partprobe "$DEV" || sleep 2

              mkfs.ext4 -F -L corvus-root "${DEV}2"
            timeoutSec: 120

        # 4) Mount the new root and lay down a Gentoo @system directly,
        #    no stage3. The bake VM's mounted portage tree + binhost
        #    (shared from the host via virtiofs) drives the install, so
        #    the resulting sysroot is guaranteed consistent with the
        #    tree state the rest of the bake uses.
        - shell:
            inline: |
              mkdir -p "$SYSROOT"
              mount "${DEV}2" "$SYSROOT"

              install -d "$SYSROOT/etc/portage" \
                         "$SYSROOT/etc/portage/package.use" \
                         "$SYSROOT/etc/portage/package.accept_keywords" \
                         "$SYSROOT/etc/portage/package.mask" \
                         "$SYSROOT/etc/portage/package.unmask" \
                         "$SYSROOT/etc/portage/package.license" \
                         "$SYSROOT/etc/portage/env" \
                         "$SYSROOT/etc/portage/repos.conf" \
                         "$SYSROOT/var/cache/distfiles" \
                         "$SYSROOT/var/cache/binpkgs" \
                         "$SYSROOT/var/db/repos" \
                         "$SYSROOT/usr/bin" \
                         "$SYSROOT/usr/lib" \
                         "$SYSROOT/usr/lib64"

              ln -sf bin       "$SYSROOT/usr/sbin"
              ln -sf usr/bin   "$SYSROOT/bin"
              ln -sf usr/sbin  "$SYSROOT/sbin"
              ln -sf usr/lib   "$SYSROOT/lib"
              ln -sf usr/lib64 "$SYSROOT/lib64"

              # Carry the bake host's binhost knobs into the new system.
              # Quoted heredoc so the ${VAR} references stay literal
              # (portage's make.conf parser will expand them) and so
              # the backticks in the comments below don't get evaluated
              # as shell command substitution. MAKEOPTS needs nproc at
              # bake time, which a quoted heredoc can't expand — we
              # append it separately after the heredoc closes.
              cat > "$SYSROOT/etc/portage/make.conf" <<'EOF'
              COMMON_FLAGS="-O2 -pipe"
              CFLAGS="${COMMON_FLAGS}"
              CXXFLAGS="${COMMON_FLAGS}"
              FCFLAGS="${COMMON_FLAGS}"
              FFLAGS="${COMMON_FLAGS}"

              # `-binpkg-request-signature binpkg-ignore-signature`:
              # the host binhost we ship by default isn't uniformly
              # signed (some old per-package binpkgs have .sig files
              # left over from a prior FEATURES=binpkg-signing run,
              # most don't). With the 23.0 profile's default
              # `binpkg-request-signature` left enabled, portage
              # routes every unsigned binpkg through its gpg-VERIFY
              # codepath — which on a fresh sysroot crashes with
              # `getgrnam(): name not found: 'nogroup'` because
              # baselayout doesn't ship a `nogroup` group. And even
              # with `-binpkg-request-signature` alone, the presence
              # of any .sig inside a gpkg still triggers VERIFY (see
              # gpkg.py:_verify_binpkg, condition `request_signature
              # or signature_exist`). Adding `binpkg-ignore-signature`
              # short-circuits verification entirely. Downstream bakes
              # against this image (corvus-test-node etc.) can then
              # `emerge --usepkg` against the heterogeneously-signed
              # binhost without crashing on the first signed binpkg.
              FEATURES="getbinpkg parallel-fetch -binpkg-request-signature binpkg-ignore-signature"
              EMERGE_DEFAULT_OPTS="--getbinpkg --usepkg --binpkg-respect-use=y --binpkg-changed-deps=n"
              ACCEPT_LICENSE="*"
              USE="bash-completion"

              # Portage's gpkg verifier (gpkg.py:checksum_helper) drops
              # privileges to nobody:nogroup whenever a gpkg contains a
              # .sig — and that happens BEFORE any FEATURES check, so
              # binpkg-ignore-signature alone can't avoid the lookup.
              # Gentoo's baselayout doesn't ship a 'nogroup' group, so
              # the lookup crashes with KeyError: "getgrnam(): name not
              # found: 'nogroup'" the first time a partially-signed
              # binpkg (e.g. acct-group/postgres) lands. Empty value
              # tells portage to skip the privilege drop entirely.
              GPG_VERIFY_USER_DROP=""
              GPG_VERIFY_GROUP_DROP=""
              EOF

              # Append MAKEOPTS with the bake-time nproc baked in;
              # portage's make.conf parser doesn't run $() so we
              # resolve it at write time instead.
              echo "MAKEOPTS=\"-j$(nproc)\"" >> "$SYSROOT/etc/portage/make.conf"

              cat > "$SYSROOT/etc/portage/package.use/grub" <<'EOF'
              sys-boot/grub grub_platforms_pc -mount -nls -fonts -themes
              EOF

              cat > "$SYSROOT/etc/portage/repos.conf/gentoo.conf" <<'EOF'
              [DEFAULT]
              main-repo = gentoo

              [gentoo]
              location = /var/db/repos/gentoo
              sync-type = rsync
              sync-uri = rsync://rsync.gentoo.org/gentoo-portage
              auto-sync = yes
              EOF

              # Relative make.profile so the symlink resolves on the
              # booted image the first time the user runs
              # `emerge-webrsync` (or `emerge --sync`) — same convention
              # the stage3 tarball used.
              ln -sf ../../var/db/repos/gentoo/profiles/default/linux/amd64/23.0/systemd \
                "$SYSROOT/etc/portage/make.profile"

              # Trust keys for binpkg signature verification.
              cp -a /etc/portage/gnupg "$SYSROOT/etc/portage/gnupg"

              # Break the well-known systemd ↔ util-linux build
              # circular dep: util-linux[systemd] needs sys-apps/systemd
              # to build, but systemd needs util-linux. Stage3 used to
              # paper over this by shipping a pre-built util-linux. With
              # no stage3 we have to bootstrap manually — install
              # util-linux without the systemd USE first, then re-emerge
              # it at the end of this step so the final image has full
              # systemd integration.
              #
              # The override goes in the BAKE VM's /etc/portage (not
              # the sysroot's) because the @system emerge below uses
              # ROOT=$SYSROOT only — it reads /etc/portage from the
              # live bake VM, not from the sysroot. We use a name
              # outside the sysroot so the bootstrap doesn't leak into
              # the final image.
              install -d /etc/portage/package.use
              # `build` USE on util-linux is the stage3-style minimal
              # mode that strips systemd + udev + most extras in one
              # flag — breaks both the systemd↔util-linux cycle AND
              # the libudev→systemd→util-linux→libudev cycle that comes
              # in via `virtual/libudev`. Pam still needs an explicit
              # -systemd to break the pam↔systemd cycle.
              cat > /etc/portage/package.use/zz-corvus-bootstrap <<'EOF'
              sys-apps/util-linux build
              sys-libs/pam -systemd
              EOF

              # Install @system into the sysroot using the bake VM's
              # live portage (host's tree, mounted) and the host
              # binhost. Bake VM's /etc/portage drives the resolve —
              # both ends are amd64 systemd Gentoo with the same
              # binhost config.
              #
              # `env -u SYSROOT` is critical: this pipeline exports a
              # shell-level SYSROOT=/mnt/sysroot for ergonomics, but
              # portage interprets a non-empty SYSROOT as the
              # cross-compile target sysroot and pipes
              # `--sysroot=/mnt/sysroot` through to GCC / CMake. With a
              # freshly-formatted /mnt/sysroot (no /usr/include yet),
              # every source-build ebuild then dies with "fatal error:
              # assert.h: No such file or directory". Unsetting SYSROOT
              # here puts portage in native mode — uses the bake VM's
              # own headers/libs, installs into ROOT=/mnt/sysroot.
              env -u SYSROOT ROOT="$SYSROOT" emerge -vt @system

              # Cycles broken: drop the overrides and re-emerge the
              # bootstrapped packages with full USE now that
              # sys-apps/systemd is on disk in the sysroot.
              rm /etc/portage/package.use/zz-corvus-bootstrap
              ROOT="$SYSROOT" emerge -vt -1 sys-apps/util-linux sys-libs/pam

              # systemd-PID1's required pseudo-fs mountpoints. baselayout
              # normally lays /proc, /sys, /dev, /run, /tmp down on a
              # fresh stage3 unpack, but its ROOT=$SYSROOT @system
              # install above doesn't reliably create them — without
              # these the booted image hangs at PID1 with "Failed to
              # mount proc/sys/dev: No such file or directory" plus a
              # very early "devtmpfs: error mounting -2" from the
              # kernel's auto-mount.
              install -d -m 755 "$SYSROOT/proc" "$SYSROOT/sys" \
                                "$SYSROOT/dev"  "$SYSROOT/run"
              install -d -m 1777 "$SYSROOT/tmp" "$SYSROOT/var/tmp"
            timeoutSec: 7200

        # 5) Build and install the kernel from sys-kernel/gentoo-sources.
        #    Stage 1 already emerged gentoo-sources into the bake VM,
        #    so /usr/src/linux-*-gentoo* is on disk — we just build it
        #    and install the result into the sysroot.
        - shell:
            inline: |
              KSRC=$(ls -1d /usr/src/linux-*-gentoo* 2>/dev/null | sort -V | tail -1)
              test -n "$KSRC" -a -d "$KSRC" \
                || { echo "no gentoo-sources install at /usr/src/linux-*-gentoo"; ls /usr/src/; exit 1; }

              install -m 0644 /tmp/gentoo-kernel-config "$KSRC/.config"
              make -C "$KSRC" -j"$(nproc)" \
                ARCH=x86_64 olddefconfig

              make -C "$KSRC" -j"$(nproc)" ARCH=x86_64 bzImage modules
              make -C "$KSRC" -j"$(nproc)" ARCH=x86_64 \
                INSTALL_MOD_PATH="$SYSROOT" modules_install

              KVER=$(make -C "$KSRC" -s ARCH=x86_64 kernelrelease)
              test -n "$KVER"
              install -d "$SYSROOT/boot"
              install -m 0644 "$KSRC/arch/x86/boot/bzImage" \
                "$SYSROOT/boot/vmlinuz-$KVER"
              install -m 0644 "$KSRC/System.map" \
                "$SYSROOT/boot/System.map-$KVER"
              install -m 0644 "$KSRC/.config" \
                "$SYSROOT/boot/config-$KVER"
            timeoutSec: 14400

        # 6) Install runtime packages. NOTE: app-emulation/cloud-init
        #    is INTENTIONALLY ABSENT — the headless variant has no
        #    cloud-init at all. Stage 3 layers cloud-init on top to
        #    produce the cloud-init-enabled variant.
        - shell:
            inline: |
              emerge --sysroot="$SYSROOT" --root="$SYSROOT" -vt \
                app-emulation/qemu-guest-agent \
                mail-mta/msmtp \
                app-admin/sudo \
                net-fs/nfs-utils \
                app-editors/vim \
                app-shells/bash-completion
            timeoutSec: 1800

        # 7) Install GRUB into the sysroot.
        - shell:
            inline: |
              grub-install --target=i386-pc --boot-directory="$SYSROOT/boot" /dev/vdb

              KERNEL=$(cd "$SYSROOT/boot" && ls -1t vmlinuz-* 2>/dev/null | grep -v '\.old$' | head -1)
              test -n "$KERNEL"
              ln -sf "$KERNEL" "$SYSROOT/boot/vmlinuz"

              install -d "$SYSROOT/boot/grub"
              cat > "$SYSROOT/boot/grub/grub.cfg" <<EOF
              set timeout=0
              set default=0

              insmod part_gpt
              insmod ext2
              insmod search_label

              serial --unit=0 --speed=115200
              terminal_input serial console
              terminal_output serial console

              menuentry 'Gentoo Linux (custom kernel)' {
                  search --set=root --label corvus-root
                  linux /boot/$KERNEL root=/dev/vda2 rootfstype=ext4 console=tty0 console=ttyS0,115200n8
              }
              EOF
            timeoutSec: 600

        # 8) Configure the resulting system: fstab, hostname, machine-id
        #    placeholder, serial getty, sshd, and a wildcard
        #    systemd-networkd unit so DHCP comes up on whatever NIC the
        #    operator hands the VM. NO cloud-init enables here — the
        #    headless variant ships without cloud-init entirely.
        - shell:
            inline: |
              cat > "$SYSROOT/etc/fstab" <<'EOF'
              LABEL=corvus-root  /  ext4  defaults,noatime  0 1
              EOF

              echo gentoo-headless > "$SYSROOT/etc/hostname"
              : > "$SYSROOT/etc/machine-id"   # populated by systemd on first boot

              # Pre-set the timezone to UTC. systemd-firstboot
              # otherwise blocks on stdin asking the operator to pick a
              # zone — fine in a docked desktop install, fatal on a
              # headless serial-console boot. The /etc/localtime
              # symlink (relative, into /usr/share/zoneinfo) signals
              # "timezone already chosen" to firstboot.
              ln -sf ../usr/share/zoneinfo/UTC "$SYSROOT/etc/localtime"

              # Pin the system locale to en_US.UTF-8 and generate it
              # in the sysroot. Without this, baselayout leaves
              # /etc/locale.conf empty and processes inherit the C /
              # POSIX locale (ASCII-only). Anything that prints a
              # non-ASCII character — `crv`'s em-dash separators, for
              # one — then crashes with "commitBuffer: invalid
              # argument (cannot encode character …)" on stdout, and
              # postgres' initdb refuses to run ("invalid locale
              # settings"). Gentoo's glibc doesn't include any
              # built-in UTF-8 locale, so we have to localedef one
              # into the sysroot — which means a chroot because the
              # sysroot's localedef wants the sysroot's
              # /usr/share/i18n data, not the bake VM's. The
              # locale-gen wrapper (sys-apps/locale-gen) is NOT in
              # @system, so we call localedef from glibc directly.
              cat > "$SYSROOT/etc/locale.gen" <<'EOF'
              en_US.UTF-8 UTF-8
              EOF
              cat > "$SYSROOT/etc/locale.conf" <<'EOF'
              LANG=en_US.UTF-8
              EOF
              install -d "$SYSROOT/usr/lib/locale"
              mount --bind /dev  "$SYSROOT/dev"
              mount --bind /proc "$SYSROOT/proc"
              mount --bind /sys  "$SYSROOT/sys"
              chroot "$SYSROOT" localedef -i en_US -f UTF-8 en_US.UTF-8
              umount "$SYSROOT/sys" "$SYSROOT/proc" "$SYSROOT/dev"

              install -d "$SYSROOT/etc/systemd/network"
              cat > "$SYSROOT/etc/systemd/network/20-wired.network" <<'EOF'
              [Match]
              Name=en* eth*

              [Network]
              DHCP=yes
              EOF

              systemctl --root="$SYSROOT" enable \
                systemd-networkd.service \
                systemd-resolved.service \
                sshd.service \
                qemu-guest-agent.service \
                serial-getty@ttyS0.service

              # Resolved-managed /etc/resolv.conf
              ln -sf /run/systemd/resolve/stub-resolv.conf "$SYSROOT/etc/resolv.conf" || true
            timeoutSec: 120

        # 9) Tear down build scratch, write provenance, then unmount
        #    cleanly so the qcow2's last consistent state is on disk
        #    before Corvus detaches it.
        - shell:
            inline: |
              cat > "$SYSROOT/etc/corvus-image-info" <<EOF
              image: gentoo-base-headless
              built: $(date -Iseconds)
              EOF

              sync
              umount "$SYSROOT"
            timeoutSec: 300

      cleanup: onSuccess

  # ─────────────────────────────────────────────────────────────────
  # Bake-VM template for stage 3. Same shape as gentoo-builder-bake
  # but rooted on the just-built gentoo-base-headless disk and with
  # cloudInit: false — the headless image has no cloud-init, so the
  # bake VM can't run a NoCloud ISO at first boot. Mounts are done
  # by stage 3's first shell provisioner instead (see below).
  # ─────────────────────────────────────────────────────────────────
  - apply:
      ifExists: skip   # outer daemon predates ifExists: overwrite; manually `crv template delete <name>` to re-apply edits
      templates:
        - name: gentoo-headless-bake
          cpuCount: 8
          ramMb: 8192
          cloudInit: false
          guestAgent: true
          headless: true
          description: "Gentoo headless bake VM (stage 3's bake host)"
          sharedDirs:
            - path: /var/db/repos
              tag: repos
              readOnly: true
            - path: /data/portage/distfiles
              tag: distfiles
              readOnly: true
          drives:
            # NO OVMF pflash here — gentoo-base-headless installs
            # GRUB with `--target=i386-pc` (BIOS MBR), so the bake
            # VM must boot under SeaBIOS (QEMU's default firmware).
            # Attaching the OVMF pflash pair makes the firmware
            # search for \EFI\BOOT\BOOTX64.EFI which doesn't
            # exist on this disk, and the VM sits at the firmware
            # menu forever, QGA never starts, the build's
            # first-ping wait times out after 90s.
            - diskImageName: gentoo-base-headless
              interface: virtio
              strategy: overlay
              cacheType: writeback
              discard: true
          networkInterfaces:
            - network: corvus

  # ─────────────────────────────────────────────────────────────────
  # Stage 3: bake gentoo-base-headless-cloudinit — overlay on
  # gentoo-base-headless with cloud-init installed + configured.
  # ─────────────────────────────────────────────────────────────────
  # The bake VM here has NO cloud-init (its rootfs is the headless
  # image), so we can't rely on cloud-init runcmd to do the
  # mount setup. The first shell provisioner does the mounts
  # directly — same pattern as corvus-test-node.yml. The second
  # provisioner emerges cloud-init, enables its units, and writes
  # the NoCloud datasource pin.
  - build:
      name: gentoo-base-headless-cloudinit
      description: gentoo-base-headless + cloud-init (NoCloud datasource)
      template: gentoo-headless-bake

      target:
        format: qcow2
        path: BaseImages/Gentoo/
        compact: true
        ifExists: skip

      strategy: overlay

      vm:
        cpuCount: 8
        ramMb: 8192

      shellDefaults:
        preamble: "set -eux"

      provisioners:
        # 1) Replicate the mount setup that gentoo-cloud's userData
        #    would do at first boot. We need the virtiofs repos +
        #    distfiles overlay + NFS binpkgs available to portage
        #    before we can emerge cloud-init.
        #
        #    The bake template has 'cloudInit: false' (the headless
        #    image has no cloud-init installed), so unlike the other
        #    bake VMs we don't get cloud-init's implicit
        #    'wait for systemd-networkd-wait-online' before runcmd.
        #    systemd-networkd is enabled but DHCP may not have
        #    completed by the time provisioners start running, so
        #    we explicitly poll for a route to the NFS server
        #    before attempting the NFS mount.
        - shell:
            inline: |
              # virtiofs mounts need no network — do them first.
              mkdir -p /var/db/repos
              mountpoint -q /var/db/repos || mount -t virtiofs repos /var/db/repos

              # virtiofs distfiles + ephemeral overlay (same shape
              # as the gentoo-cloud bootcmd).
              mkdir -p /var/cache/distfiles /run/distfiles-host \
                       /var/tmp/distfiles-upper /var/tmp/distfiles-work
              mountpoint -q /run/distfiles-host || \
                mount -t virtiofs distfiles /run/distfiles-host
              mountpoint -q /var/cache/distfiles || \
                mount -t overlay overlay \
                  -o lowerdir=/run/distfiles-host,upperdir=/var/tmp/distfiles-upper,workdir=/var/tmp/distfiles-work \
                  /var/cache/distfiles

              # Wait for the NIC to come up + DHCP to land a default
              # route. systemd-networkd-wait-online --any will block
              # until at least one managed link is "routable"
              # (carrier + an address + a default gateway). Bounded
              # by --timeout so a misconfigured bake host doesn't
              # hang the build indefinitely.
              systemd-networkd-wait-online --any --timeout=60 || true

              # Defense in depth: also confirm the NFS server is
              # actually reachable. systemd-networkd may briefly
              # report 'routable' before ARP resolves on a fresh
              # bridge.
              for i in $(seq 1 30); do
                ip route get 192.168.72.1 >/dev/null 2>&1 && \
                  ping -c1 -W1 192.168.72.1 >/dev/null 2>&1 && break
                sleep 1
              done

              # NFS binpkgs (host writes flow back to bobr's tree via
              # all_squash on the export side; see gentoo-cloud's
              # comments for the EPERM avoidance rationale).
              mkdir -p /var/cache/binpkgs
              mountpoint -q /var/cache/binpkgs || \
                mount -t nfs4 -o rw,vers=4.2 \
                  192.168.72.1:/data/portage/binpkgs_corvus /var/cache/binpkgs

              # Wait for DNS in case any source-build fetches kick in.
              for i in $(seq 1 60); do
                getent hosts distfiles.gentoo.org >/dev/null && break
                sleep 2
              done
            timeoutSec: 180

        # 2) Install + configure cloud-init. The output overlay
        #    captures all of these changes (emerge writes to / =
        #    bake-VM rootfs = the artifact under overlay strategy).
        - shell:
            inline: |
              emerge --noreplace --usepkg --binpkg-respect-use=y --quiet-build \
                app-emulation/cloud-init

              systemctl enable \
                cloud-init.target \
                cloud-init-main.service \
                cloud-init-local.service \
                cloud-config.service \
                cloud-final.service \
                cloud-init-hotplugd.socket

              # Pin cloud-init's datasource to NoCloud and skip
              # ds-identify's auto-detection. Corvus's apply YAML
              # always supplies cloud-init data via a NoCloud cidata
              # ISO (see Handlers/CloudInit.hs); ds-identify can race
              # the IDE CDROM enumeration on early boot and tell the
              # cloud-init generator "no datasource", which writes
              # /run/cloud-init/cloud-init.disabled and you end up
              # with `cloud-init status` reporting "disabled-by-
              # generator". Pinning datasource_list bypasses the
              # generator's veto.
              install -d /etc/cloud/cloud.cfg.d
              cat > /etc/cloud/cloud.cfg.d/90_corvus_nocloud.cfg <<'EOF'
              datasource_list: [ NoCloud, None ]
              # cc_locale on Gentoo calls 'locale-gen' by name (the
              # sys-apps/locale-gen package). Stage 2 of this
              # pipeline deliberately doesn't install that wrapper
              # — it generates en_US.UTF-8 via 'localedef' from
              # glibc directly at bake time and writes
              # /etc/locale.conf — so when cc_locale runs on first
              # boot it can't find locale-gen, marks
              # cloud-config.service as FAILED, and logs a noisy
              # "Running module locale (...) failed" line. The
              # system locale is already set correctly; setting
              # 'locale: false' skips the module entirely. (See
              # the bake-time localedef block in stage 2 step 8.)
              locale: false
              EOF

              cat > /etc/corvus-image-info <<EOF
              image: gentoo-base-headless-cloudinit
              built: $(date -Iseconds)
              EOF
            timeoutSec: 1800

      cleanup: onSuccess

  # ─────────────────────────────────────────────────────────────────
  # Final user-facing templates.
  # ─────────────────────────────────────────────────────────────────
  # `gentoo-headless`         — no cloud-init. Consumed by
  #                             corvus-test-node.yml (the harness
  #                             bakes the SSH key into the image
  #                             directly, no first-boot config).
  # `gentoo-headless-cloudinit` — cloud-init enabled. Consumed by
  #                               gentoo-test.yml and any other
  #                               VM that wants cloud-init's
  #                               first-boot ergonomics (SSH key
  #                               injection, runcmd, etc.).
  - apply:
      ifExists: skip
      templates:
        - name: gentoo-headless
          cpuCount: 8
          # 16 GB default — the gentoo-headless image is the bake
          # root for corvus-test-node.yml, whose source-build
          # provisioners (qemu, postgresql, ghc, node, …) peak at
          # ~12 GB total with MAKEOPTS=-j$(nproc) on 8 cores. The
          # build's own `vm:` block is only used for cache-hash
          # computation (see Build/Cache/Hash.hs), not for sizing
          # the bake VM — so the bake-VM RAM has to live here, on
          # the template. Runtime VMs that don't need this much
          # can override per-VM (corvus-test-node.yml's harness
          # apply does exactly that).
          ramMb: 16384
          cloudInit: false
          guestAgent: true
          headless: true
          description: "Gentoo headless (no cloud-init)"
          drives:
            - diskImageName: gentoo-base-headless
              interface: virtio
              strategy: overlay
              cacheType: writeback
              discard: true
              sizeMb: 40960
          networkInterfaces:
            - network: corvus
          # No 'sshKeys:' — cloud-init is disabled and the daemon
          # refuses 'cloudInit: false' + 'sshKeys' (the keys would
          # have nowhere to land at first boot). Downstream
          # consumers (e.g. corvus-test-node.yml) bake the harness
          # SSH key into /home/<user>/.ssh/authorized_keys via a
          # build-time 'file:' provisioner instead.

        - name: gentoo-headless-cloudinit
          cpuCount: 8
          # 16 GB default — see the matching ramMb comment on the
          # `gentoo-headless` template above. The gentoo-test.yml
          # bake VM uses this template and source-builds nodejs /
          # v8 with peak working sets near 12 GB.
          ramMb: 16384
          cloudInit: true
          guestAgent: true
          headless: true
          description: "Gentoo headless (with cloud-init)"
          drives:
            - diskImageName: gentoo-base-headless-cloudinit
              interface: virtio
              strategy: overlay
              cacheType: writeback
              discard: true
              sizeMb: 40960
          networkInterfaces:
            - network: corvus
          sshKeys:
            - name: corvus
          cloudInitConfig:
            userData:
              # Clear root's password so console login works without
              # one. 'passwd -d' empties the shadow field; SSH still
              # honours PermitRootLogin / PermitEmptyPasswords, so
              # remote root login stays blocked by sshd's defaults.
              runcmd:
                - [ passwd, -d, root ]
