# Self-contained Gentoo headless image — same final artifact as
# gentoo-headless.yml but without any host-side mounts. Where the
# co-located variant shares /var/db/repos + /data/portage/distfiles
# via virtiofs and writes binpkgs back through an NFS export, this
# one fetches everything (portage tree, distfiles, binpkgs) directly
# from the official Gentoo mirrors:
#
#   * portage tree    — `emerge-webrsync` (initial) + `emerge --sync`
#                       against rsync://rsync.gentoo.org/gentoo-portage
#   * distfiles       — default Gentoo mirrors (set by the cloud-init
#                       base image's /etc/portage/make.conf)
#   * binpkgs         — official binhost at
#                       https://distfiles.gentoo.org/releases/amd64/
#                       binpackages/23.0/x86-64/
#
# Binary packages from the official binhost are still preferred over
# source compilation (`FEATURES=getbinpkg`, `EMERGE_DEFAULT_OPTS
# --getbinpkg --usepkg --binpkg-respect-use=y`). Signature verification
# is DISABLED for the binhost: the gpkgs published at
# distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64/ are
# UNSIGNED (no .sig entry inside the gpkg tar), and the binhost's own
# Packages index advertises this via `FEATURES: ...
# binpkg-ignore-signature ...`. Without `verify-signature = false` in
# binrepos.conf + `binpkg-ignore-signature` in make.conf, every binpkg
# would be rejected with "no valid OpenPGP data found" and the bake
# would fall back to source-building glibc / systemd / linux-firmware /
# grub — which is too slow for a CI bake and tends to fail under
# memory pressure with --keep-going=y.
#
# The published artifact disk is `gentoo-base-headless-standalone`
# (registered non-ephemeral on success). A second template,
# `gentoo-headless-standalone`, overlays the artifact for downstream
# VM creation.
# Build-time variables. `gentoo_base_cloud_url` is declared without
# a default (required) because the upstream Gentoo autobuild filename
# rotates every few days; pass the current URL via
# `crv build --var gentoo_base_cloud_url=...` or use the Makefile,
# which discovers the latest filename and threads it through for you.
vars:
  gentoo_base_cloud_url: ~

pipeline:
  - apply:
      ifExists: skip

      disks:
        - name: gentoo-base-cloud
          import: "{{ gentoo_base_cloud_url }}"
          format: qcow2
          path: BaseImages/Gentoo/

      templates:
        - name: gentoo-cloud-standalone
          cpuCount: 4
          ramMb: 2048
          cloudInit: true
          guestAgent: true
          description: "Gentoo bake template (no host mounts; official mirrors only)"
          cloudInitConfig:
            userData:
              # The cloud-init base image ships with /var/db/repos/
              # empty — it relies on the deployer to sync a portage
              # tree on first boot. Without a tree, every emerge
              # bails out with "Invalid Repository Location". Pull
              # the tree (a single ~120 MB signed tarball + extract,
              # ~30-60 s on a healthy network) BEFORE installing
              # qemu-guest-agent from the official binhost.
              #
              # `getuto` then drops the Gentoo release keys into
              # /etc/portage/gnupg so `binpkg-request-signature`
              # can authenticate the binhost — the cloud-init image
              # has `verify-signature = true` set by default, so
              # without the keys every binpkg would be rejected.
              runcmd:
                - emerge-webrsync --quiet
                - getuto
                - emerge --getbinpkg --usepkg --binpkg-respect-use=y --quiet-build app-emulation/qemu-guest-agent
                - systemctl enable --now qemu-guest-agent.service
          drives:
            - diskImageName: gentoo-base-cloud
              interface: virtio
              strategy: overlay
              cacheType: writeback
              discard: true
            - diskImageName: ovmf-code
              interface: pflash
              readOnly: true
              strategy: direct
            - diskImageName: ovmf-vars
              interface: pflash
              strategy: clone
          networkInterfaces:
            - network: corvus
          sshKeys:
            - name: corvus

  - build:
      name: gentoo-base-headless-standalone
      description: Minimal headless Gentoo with custom kernel (BIOS+GPT, ext4); self-contained — no host mounts
      template: gentoo-cloud-standalone

      target:
        format: qcow2
        sizeGb: 20
        path: BaseImages/Gentoo/
        compact: true
        ifExists: overwrite

      strategy: from-scratch

      vm:
        cpuCount: 4
        ramMb: 2048

      shellDefaults:
        preamble: "set -eux"
        env:
          SYSROOT: /mnt/sysroot
          DEV: /dev/vdb

      provisioners:
        # 1) Bake-host prep: pull the portage tree fresh from
        #    rsync.gentoo.org, point the bake VM at the official
        #    binhost, trust the release keys, then update @world.
        - shell:
            env:
              SYSROOT: /
            inline: |
              # Wait until outbound DNS works before touching the network.
              for i in $(seq 1 60); do
                getent hosts distfiles.gentoo.org >/dev/null && break
                sleep 2
              done
              getent hosts distfiles.gentoo.org >/dev/null \
                || { echo "network never came up after 120s" >&2; exit 1; }

              mkdir -p /etc/portage/package.use
              cat > /etc/portage/package.use/grub <<'EOF'
              sys-boot/grub grub_platforms_pc -mount -nls -fonts -themes
              EOF

              # The cloud-init userData ran `emerge-webrsync` at
              # first boot to populate /var/db/repos/gentoo (the
              # cloud-init base image ships with an empty tree).
              # webrsync produces a signature-verified snapshot, so
              # we have a usable tree by the time step 1 starts.
              #
              # Running `emerge --sync` here would re-rsync from the
              # mirror — and immediately after a webrsync the
              # mirror's Manifest.gz typically differs by a few
              # bytes from the snapshot tarball we extracted (the
              # rsync mirror updates faster than the daily
              # webrsync tarball), tripping
              # "Manifest verification failed: expected: NNNN,
              # have: NNNN+2". So we run a fresh webrsync only when
              # the tree is genuinely missing (defensive — should
              # never fire post-cloud-init), and skip the rsync
              # sync entirely.
              if [ ! -d /var/db/repos/gentoo/metadata ]; then
                emerge-webrsync
              fi

              # Append binhost + binpkg flags to the bake VM's
              # /etc/portage/make.conf. The cloud-init image's
              # make.conf likely already names the default binhost;
              # we set it explicitly so the bake doesn't silently
              # source-compile if the default changes.
              # binrepos.conf: turn signature verification off for
              # the official binhost. The gpkgs at this URL are
              # unsigned (no .sig inside the tar) and the Packages
              # index advertises `binpkg-ignore-signature` to clients;
              # leaving verify-signature=true (the cloud-init image's
              # default) makes portage reject every binpkg with
              # "GnuPG verification failed: no valid OpenPGP data".
              install -d /etc/portage/binrepos.conf
              cat > /etc/portage/binrepos.conf/gentoo.conf <<'EOF'
              [binhost]
              priority = 9999
              sync-uri = https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64
              verify-signature = false
              EOF

              grep -q 'FEATURES=.*getbinpkg' /etc/portage/make.conf 2>/dev/null || cat >> /etc/portage/make.conf <<'EOF'

              # `-binpkg-request-signature binpkg-ignore-signature` —
              # see the binrepos.conf comment above. The 23.0
              # profile defaults to `binpkg-request-signature`, which
              # would route every binpkg through gpg-verify and bail
              # out because the binhost's gpkgs have no `.sig` entry.
              # `binpkg-ignore-signature` short-circuits the
              # verification entirely.
              FEATURES="${FEATURES} buildpkg getbinpkg parallel-fetch -binpkg-request-signature binpkg-ignore-signature"
              EMERGE_DEFAULT_OPTS="${EMERGE_DEFAULT_OPTS} --getbinpkg --usepkg --binpkg-respect-use=y --binpkg-changed-deps=n"
              ACCEPT_LICENSE="*"

              # Portage's gpkg verifier (gpkg.py:checksum_helper) still
              # drops privileges to nobody:nogroup whenever it touches
              # a gpkg, BEFORE the FEATURES check — so even with
              # binpkg-ignore-signature, an unsafe-ownership trap on
              # /etc/portage/gnupg can fire. Empty drops keep the
              # verifier running as root so the trap never trips.
              GPG_VERIFY_USER_DROP=""
              GPG_VERIFY_GROUP_DROP=""
              EOF

              # Install Gentoo release keys into /etc/portage/gnupg so
              # the binpkg verifier can authenticate the binhost.
              # `getuto` is provided by app-portage/getuto on modern
              # cloud-init images; on older bases we emerge it first.
              # Failure to install the keys would silently fall back
              # to source builds (signature mismatch == binpkg
              # rejected), so this stays strict — no `|| true`.
              command -v getuto >/dev/null \
                || emerge -1q app-portage/getuto
              getuto

              emerge --noreplace -vg \
                sys-apps/gptfdisk \
                sys-block/parted \
                sys-fs/e2fsprogs \
                sys-boot/grub:2

              # Unmerge app-emulation/cloud-init from the bake VM
              # before the @world update.
              #
              # The cloud-init base image's installed cloud-init is
              # pinned to PYTHON_SINGLE_TARGET=python3_13, while
              # the live tree's dev-python/jinja2 / markupsafe /
              # certifi / setuptools / trove-classifiers have
              # already transitioned to python3_14-only. cloud-init
              # is the lone python3_13 holdout that pins jinja2 et
              # al. to BOTH 3.13 and 3.14, producing an
              # unsolvable slot conflict no amount of --backtrack
              # can resolve.
              #
              # cloud-init is single-shot — by the time step 1
              # runs, its runcmd has already done its work
              # (qemu-guest-agent installed, ssh keys injected).
              # The bake VM is ephemeral, so leaving cloud-init
              # behind serves no purpose; removing it lets the
              # rest of @world transition to python3_14 cleanly.
              emerge -C --quiet app-emulation/cloud-init

              # Bring the bake VM's @world in line with the freshly-
              # synced tree, drawing binpkgs from the official
              # binhost.
              #
              # Two-pass with --keep-going=y to survive the portage
              # self-upgrade across Python targets: the old portage
              # (python3.13) can crash in `_post_merge_sync`
              # mid-replace; the second pass uses the freshly
              # installed new portage and finishes the rest.
              emerge --update --deep --newuse --getbinpkg --usepkg \
                --binpkg-respect-use=y --quiet-build --keep-going=y \
                -v @world || \
              emerge --update --deep --newuse --getbinpkg --usepkg \
                --binpkg-respect-use=y --quiet-build --keep-going=y \
                -v @world
            timeoutSec: 3600

        # 2) Copy kernel config onto the bake VM.
        #    Step 5 copies it to $SYSROOT/usr/src/linux/.config and
        #    builds gentoo-sources against it.
        - file:
            from: ./gentoo-kernel
            to: /tmp/gentoo-kernel-config
            mode: "0644"

        # 3) Partition the empty target disk. /dev/vdb is the second
        #    drive — the bake VM's bootdisk is /dev/vda. GPT layout with
        #    a 1 MiB BIOS-boot partition (type ef02 for GRUB stage 1.5)
        #    and a single ext4 root.
        - shell:
            inline: |
              wipefs -a "$DEV"
              sgdisk --zap-all "$DEV"
              sgdisk -n 1:0:+1M  -t 1:ef02 -c 1:bios "$DEV"
              sgdisk -n 2:0:0    -t 2:8300 -c 2:root "$DEV"
              partprobe "$DEV" || sleep 2

              mkfs.ext4 -F -L corvus-root "${DEV}2"
            timeoutSec: 120

        # 4) Mount the new root and lay down a Gentoo @system directly,
        #    no stage3. The bake VM's portage tree + official binhost
        #    drive the install; the resulting sysroot is consistent with
        #    the tree state the rest of the bake uses.
        - shell:
            inline: |
              mkdir -p "$SYSROOT"
              mount "${DEV}2" "$SYSROOT"

              install -d "$SYSROOT/etc/portage" \
                         "$SYSROOT/etc/portage/package.use" \
                         "$SYSROOT/etc/portage/package.accept_keywords" \
                         "$SYSROOT/etc/portage/package.mask" \
                         "$SYSROOT/etc/portage/package.unmask" \
                         "$SYSROOT/etc/portage/package.license" \
                         "$SYSROOT/etc/portage/env" \
                         "$SYSROOT/etc/portage/repos.conf" \
                         "$SYSROOT/etc/portage/binrepos.conf" \
                         "$SYSROOT/var/cache/distfiles" \
                         "$SYSROOT/var/cache/binpkgs" \
                         "$SYSROOT/var/db/repos" \
                         "$SYSROOT/usr/bin" \
                         "$SYSROOT/usr/lib" \
                         "$SYSROOT/usr/lib64"

              # Pre-stage merged-usr symlinks. Gentoo's 23.0 profile is
              # merged-usr (everything under /usr); profile.bashrc dies
              # with "23.0 merged-usr profile, but disk is split-usr"
              # the moment the first ebuild's environment loads if the
              # sysroot doesn't have /{bin,sbin,lib,lib64} as symlinks
              # into /usr. Stage3 tarballs ship these pre-created — we
              # don't have one, so create them ourselves before the
              # first emerge.
              #
              # /usr/sbin is ALSO a symlink (to bin) in modern merged-
              # usr Gentoo — sbin and bin are unified inside /usr too.
              ln -sf bin       "$SYSROOT/usr/sbin"
              ln -sf usr/bin   "$SYSROOT/bin"
              ln -sf usr/sbin  "$SYSROOT/sbin"
              ln -sf usr/lib   "$SYSROOT/lib"
              ln -sf usr/lib64 "$SYSROOT/lib64"

              # Carry the official-binhost knobs into the new system.
              # Signature verification stays at the 23.0 profile
              # default (`binpkg-request-signature` on); the release
              # keys land in /etc/portage/gnupg below. MAKEOPTS needs
              # nproc at bake time, which a quoted heredoc can't
              # expand — we append it separately after the heredoc
              # closes.
              cat > "$SYSROOT/etc/portage/make.conf" <<'EOF'
              COMMON_FLAGS="-O2 -pipe"
              CFLAGS="${COMMON_FLAGS}"
              CXXFLAGS="${COMMON_FLAGS}"
              FCFLAGS="${COMMON_FLAGS}"
              FFLAGS="${COMMON_FLAGS}"

              # `-binpkg-request-signature binpkg-ignore-signature`:
              # the official binhost serves unsigned gpkgs (see the
              # bake VM's make.conf comment for the full story).
              # Carry the same workaround into the published image so
              # downstream `emerge --usepkg` against the same binhost
              # works post-install.
              FEATURES="getbinpkg parallel-fetch -binpkg-request-signature binpkg-ignore-signature"
              EMERGE_DEFAULT_OPTS="--getbinpkg --usepkg --binpkg-respect-use=y --binpkg-changed-deps=n"
              ACCEPT_LICENSE="*"
              USE="bash-completion"

              # See the bake VM's make.conf above: portage drops gpg's
              # privileges to nobody:nogroup before any FEATURES check,
              # which then can't read /etc/portage/gnupg and bails
              # with "unsafe ownership on homedir". Empty drops keep
              # gpg running as root so the trap never trips.
              GPG_VERIFY_USER_DROP=""
              GPG_VERIFY_GROUP_DROP=""
              EOF

              # Append MAKEOPTS with the bake-time nproc baked in;
              # portage's make.conf parser doesn't run $() so we
              # resolve it at write time instead.
              echo "MAKEOPTS=\"-j$(nproc)\"" >> "$SYSROOT/etc/portage/make.conf"

              cat > "$SYSROOT/etc/portage/package.use/grub" <<'EOF'
              sys-boot/grub grub_platforms_pc -mount -nls -fonts -themes
              EOF

              cat > "$SYSROOT/etc/portage/repos.conf/gentoo.conf" <<'EOF'
              [DEFAULT]
              main-repo = gentoo

              [gentoo]
              location = /var/db/repos/gentoo
              sync-type = rsync
              sync-uri = rsync://rsync.gentoo.org/gentoo-portage
              auto-sync = yes
              EOF

              cat > "$SYSROOT/etc/portage/binrepos.conf/gentoo.conf" <<'EOF'
              [binhost]
              priority = 9999
              sync-uri = https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64
              verify-signature = false
              EOF

              # Relative make.profile so the symlink resolves on the
              # booted image the first time the user runs
              # `emerge-webrsync` (or `emerge --sync`) — same convention
              # the stage3 tarball used.
              ln -sf ../../var/db/repos/gentoo/profiles/default/linux/amd64/23.0/systemd \
                "$SYSROOT/etc/portage/make.profile"

              # Carry the bake VM's /etc/portage/gnupg into the
              # sysroot. Binpkg signature verification is disabled
              # for the unsigned official binhost (see make.conf
              # above), but the gnupg dir holds release keys getuto
              # installed and is used by other portage paths
              # (rsync-verify, manifest checks). Keep it copied so
              # those keep working post-install.
              cp -a /etc/portage/gnupg "$SYSROOT/etc/portage/gnupg"

              # Break the well-known systemd ↔ util-linux build
              # circular dep: util-linux[systemd] needs sys-apps/systemd
              # to build, but systemd needs util-linux. Stage3 used to
              # paper over this by shipping a pre-built util-linux. With
              # no stage3 we have to bootstrap manually — install
              # util-linux without the systemd USE first, then re-emerge
              # it at the end of this step so the final image has full
              # systemd integration.
              install -d /etc/portage/package.use
              cat > /etc/portage/package.use/zz-corvus-bootstrap <<'EOF'
              sys-apps/util-linux build
              sys-libs/pam -systemd
              EOF

              # Install @system into the sysroot using the bake VM's
              # live portage and the official binhost. Bake VM's
              # /etc/portage drives the resolve — both ends are
              # amd64 systemd Gentoo with the same binhost config.
              #
              # `env -u SYSROOT` is critical: this pipeline exports a
              # shell-level SYSROOT=/mnt/sysroot for ergonomics, but
              # portage interprets a non-empty SYSROOT as the
              # cross-compile target sysroot. Unsetting it here puts
              # portage in native mode — uses the bake VM's own
              # headers/libs, installs into ROOT=/mnt/sysroot.
              env -u SYSROOT ROOT="$SYSROOT" emerge -vt @system

              # Cycles broken: drop the overrides and re-emerge the
              # bootstrapped packages with full USE now that
              # sys-apps/systemd is on disk in the sysroot.
              rm /etc/portage/package.use/zz-corvus-bootstrap
              ROOT="$SYSROOT" emerge -vt -1 sys-apps/util-linux sys-libs/pam

              # systemd-PID1's required pseudo-fs mountpoints. baselayout
              # normally lays /proc, /sys, /dev, /run, /tmp down on a
              # fresh stage3 unpack, but its ROOT=$SYSROOT @system
              # install above doesn't reliably create them.
              install -d -m 755 "$SYSROOT/proc" "$SYSROOT/sys" \
                                "$SYSROOT/dev"  "$SYSROOT/run"
              install -d -m 1777 "$SYSROOT/tmp" "$SYSROOT/var/tmp"
            timeoutSec: 7200

        # 5) Build and install the kernel from sys-kernel/gentoo-sources.
        - shell:
            inline: |
              SYSROOT="/" emerge -vt sys-kernel/gentoo-sources

              KSRC=$(ls -1d /usr/src/linux-*-gentoo* 2>/dev/null | sort -V | tail -1)
              test -n "$KSRC" -a -d "$KSRC" \
                || { echo "no gentoo-sources install at /usr/src/linux-*-gentoo"; ls /usr/src/; exit 1; }

              install -m 0644 /tmp/gentoo-kernel-config "$KSRC/.config"
              make -C "$KSRC" -j"$(nproc)" \
                ARCH=x86_64 olddefconfig

              make -C "$KSRC" -j"$(nproc)" ARCH=x86_64 bzImage modules
              make -C "$KSRC" -j"$(nproc)" ARCH=x86_64 \
                INSTALL_MOD_PATH="$SYSROOT" modules_install

              KVER=$(make -C "$KSRC" -s ARCH=x86_64 kernelrelease)
              test -n "$KVER"
              install -d "$SYSROOT/boot"
              install -m 0644 "$KSRC/arch/x86/boot/bzImage" \
                "$SYSROOT/boot/vmlinuz-$KVER"
              install -m 0644 "$KSRC/System.map" \
                "$SYSROOT/boot/System.map-$KVER"
              install -m 0644 "$KSRC/.config" \
                "$SYSROOT/boot/config-$KVER"
            timeoutSec: 14400

        # 6) Install runtime packages. Same set as the host-shared
        #    variant minus net-fs/nfs-utils — the standalone image
        #    has no need to mount remote binhost storage.
        - shell:
            inline: |
              emerge --sysroot="$SYSROOT" --root="$SYSROOT" -vt \
                app-emulation/qemu-guest-agent \
                app-emulation/cloud-init \
                mail-mta/msmtp \
                app-admin/sudo \
                app-editors/vim \
                app-shells/bash-completion
            timeoutSec: 1800

        # 7) Install GRUB into the sysroot.
        - shell:
            inline: |
              grub-install --target=i386-pc --boot-directory="$SYSROOT/boot" /dev/vdb

              KERNEL=$(cd "$SYSROOT/boot" && ls -1t vmlinuz-* 2>/dev/null | grep -v '\.old$' | head -1)
              test -n "$KERNEL"
              ln -sf "$KERNEL" "$SYSROOT/boot/vmlinuz"

              install -d "$SYSROOT/boot/grub"
              cat > "$SYSROOT/boot/grub/grub.cfg" <<EOF
              set timeout=0
              set default=0

              insmod part_gpt
              insmod ext2
              insmod search_label

              serial --unit=0 --speed=115200
              terminal_input serial console
              terminal_output serial console

              menuentry 'Gentoo Linux (custom kernel)' {
                  search --set=root --label corvus-root
                  linux /boot/$KERNEL root=/dev/vda2 rootfstype=ext4 console=tty0 console=ttyS0,115200n8
              }
              EOF
            timeoutSec: 600

        # 8) Configure the resulting system: fstab, hostname, machine-id
        #    placeholder, serial getty, sshd, and a wildcard
        #    systemd-networkd unit so DHCP comes up on whatever NIC the
        #    operator hands the VM.
        - shell:
            inline: |
              cat > "$SYSROOT/etc/fstab" <<'EOF'
              LABEL=corvus-root  /  ext4  defaults,noatime  0 1
              EOF

              echo gentoo-headless > "$SYSROOT/etc/hostname"
              : > "$SYSROOT/etc/machine-id"   # populated by systemd on first boot

              # Pre-set the timezone to UTC. systemd-firstboot
              # otherwise blocks on stdin asking the operator to pick a
              # zone — fine in a docked desktop install, fatal on a
              # headless serial-console boot.
              ln -sf ../usr/share/zoneinfo/UTC "$SYSROOT/etc/localtime"

              # Pin the system locale to en_US.UTF-8 and generate it
              # in the sysroot via chroot+localedef (Gentoo's glibc
              # ships no built-in UTF-8 locale; see the host-shared
              # variant for the full rationale).
              cat > "$SYSROOT/etc/locale.gen" <<'EOF'
              en_US.UTF-8 UTF-8
              EOF
              cat > "$SYSROOT/etc/locale.conf" <<'EOF'
              LANG=en_US.UTF-8
              EOF
              install -d "$SYSROOT/usr/lib/locale"
              mount --bind /dev  "$SYSROOT/dev"
              mount --bind /proc "$SYSROOT/proc"
              mount --bind /sys  "$SYSROOT/sys"
              chroot "$SYSROOT" localedef -i en_US -f UTF-8 en_US.UTF-8
              umount "$SYSROOT/sys" "$SYSROOT/proc" "$SYSROOT/dev"

              install -d "$SYSROOT/etc/systemd/network"
              cat > "$SYSROOT/etc/systemd/network/20-wired.network" <<'EOF'
              [Match]
              Name=en* eth*

              [Network]
              DHCP=yes
              EOF

              systemctl --root="$SYSROOT" enable \
                systemd-networkd.service \
                systemd-resolved.service \
                sshd.service \
                qemu-guest-agent.service \
                serial-getty@ttyS0.service \
                cloud-init.target \
                cloud-init-main.service \
                cloud-init-local.service \
                cloud-config.service \
                cloud-final.service \
                cloud-init-hotplugd.socket

              # Pin cloud-init's datasource to NoCloud and skip
              # ds-identify's auto-detection. Same reasoning as the
              # host-shared variant.
              install -d "$SYSROOT/etc/cloud/cloud.cfg.d"
              cat > "$SYSROOT/etc/cloud/cloud.cfg.d/90_corvus_nocloud.cfg" <<'EOF'
              datasource_list: [ NoCloud, None ]
              EOF

              # Resolved-managed /etc/resolv.conf
              ln -sf /run/systemd/resolve/stub-resolv.conf "$SYSROOT/etc/resolv.conf" || true
            timeoutSec: 120

        # 9) Tear down build scratch, write provenance, then unmount
        #    cleanly so the qcow2's last consistent state is on disk
        #    before Corvus detaches it.
        - shell:
            inline: |
              cat > "$SYSROOT/etc/corvus-image-info" <<EOF
              image: gentoo-headless (standalone — no host mounts)
              built: $(date -Iseconds)
              build-id: $(date +%s)
              built-by: corvus build-cache memory-mode demo (use-cache pass)
              EOF

              sync
              umount "$SYSROOT"
            timeoutSec: 300

      cleanup: onSuccess
