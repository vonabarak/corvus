---
# Multi-OS template library.
#
# Imports base cloud images for several Linux distributions and FreeBSD,
# then defines a template for each OS. No VMs are created — use
# `crv template instantiate <template> <vm-name>` to spin up instances.
#
# Usage:
#   make build
#   crv template instantiate debian12 my-debian-vm
#   crv vm start my-debian-vm
#
# Multi-node note: templates themselves are node-agnostic;
# the target node is chosen at instantiation time. Use
# `crv template instantiate debian12 my-debian-vm --node <name>`
# to pin a new VM to a specific node, or omit `--node` to let
# the scheduler place it.

vars:
  debian_url: ~
  debian_sha512: ~
  ubuntu_url: ~
  ubuntu_sha256: ~
  almalinux_url: ~
  almalinux_sha256: ~
  freebsd_url: ~
  freebsd_sha512: ~
  alpine_url: ~
  alpine_sha512: ~

# ── YAML anchors for shared template settings ──────────────────────────
# Anchors defined on ignored top-level keys (only sshKeys, disks,
# networks, vms, templates are recognized by the parser).

_defaults: &defaults
  cpuCount: 4
  ramMb: 4096
  cloudInit: true
  guestAgent: true

_ovmf_code_drive: &ovmf_code
  diskImageName: ovmf-code
  interface: pflash
  readOnly: true
  strategy: direct

_ovmf_vars_drive: &ovmf_vars
  diskImageName: ovmf-vars
  interface: pflash
  strategy: clone

# ── Pipeline ───────────────────────────────────────────────────────────

pipeline:
  - apply:
      ifExists: skip
      disks:
        - name: debian-12-generic-base
          import: "{{ debian_url }}"
          format: qcow2
          path: BaseImages/Debian/
          checksum:
            algorithm: sha512
            value: "{{ debian_sha512 }}"

        - name: ubuntu-24.04-server-base
          import: "{{ ubuntu_url }}"
          format: qcow2
          path: BaseImages/Ubuntu/
          checksum:
            algorithm: sha256
            value: "{{ ubuntu_sha256 }}"

        - name: almalinux-10-base
          import: "{{ almalinux_url }}"
          format: qcow2
          path: BaseImages/Almalinux/
          checksum:
            algorithm: sha256
            value: "{{ almalinux_sha256 }}"

        - name: freebsd-14-base
          import: "{{ freebsd_url }}"
          format: qcow2
          path: BaseImages/FreeBSD/
          checksum:
            algorithm: sha512
            value: "{{ freebsd_sha512 }}"
            target: download

        - name: alpine-3.21-base
          import: "{{ alpine_url }}"
          format: qcow2
          path: BaseImages/Alpine/
          checksum:
            algorithm: sha512
            value: "{{ alpine_sha512 }}"

  - apply:
      ifExists: skip
      templates:
        - name: debian12
          <<: *defaults
          description: "Debian 12 (Bookworm)"
          cloudInitConfig:
            userData:
              # `socat` is pre-installed in the Debian generic cloud image;
              # `qemu-guest-agent` is not, so cloud-init installs it.
              packages:
                - qemu-guest-agent
              # Mainline OpenSSH doesn't speak AF_VSOCK; bridge it to the
              # local sshd with a socat relay so `crv vm view` / vsock SSH
              # work the same way they do on the Alpine `corvus-test-vm`
              # image (which uses an equivalent OpenRC service).
              write_files:
                - path: /etc/systemd/system/vsock-sshd.service
                  permissions: "0644"
                  content: |
                    [Unit]
                    Description=Forward AF_VSOCK:22 to local sshd on 127.0.0.1:22
                    After=ssh.service network.target
                    Requires=ssh.service

                    [Service]
                    Type=simple
                    ExecStart=/usr/bin/socat VSOCK-LISTEN:22,fork,reuseaddr TCP:127.0.0.1:22
                    Restart=on-failure
                    RestartSec=2

                    [Install]
                    WantedBy=multi-user.target
              runcmd:
                - systemctl enable --now qemu-guest-agent
                - systemctl enable --now vsock-sshd
          drives:
            - diskImageName: debian-12-generic-base
              interface: virtio
              strategy: overlay
              cacheType: writeback
              discard: true
            - *ovmf_code
            - *ovmf_vars
          networkInterfaces:
            - network: corvus
          sshKeys:
            - name: corvus

        - name: ubuntu24
          <<: *defaults
          description: "Ubuntu 24.04 LTS"
          cloudInitConfig:
            userData:
              packages:
                - qemu-guest-agent
              runcmd:
                - systemctl enable --now qemu-guest-agent
          drives:
            - diskImageName: ubuntu-24.04-server-base
              interface: virtio
              strategy: overlay
              cacheType: writeback
              discard: true
            - *ovmf_code
            - *ovmf_vars
          networkInterfaces:
            - network: corvus
          sshKeys:
            - name: corvus

        - name: almalinux10
          <<: *defaults
          description: "AlmaLinux 10"
          cloudInitConfig:
            userData:
              packages:
                - qemu-guest-agent
              runcmd:
                - systemctl enable --now qemu-guest-agent
          drives:
            - diskImageName: almalinux-10-base
              interface: virtio
              strategy: overlay
              cacheType: writeback
              discard: true
            - *ovmf_code
            - *ovmf_vars
          networkInterfaces:
            - network: corvus
          sshKeys:
            - name: corvus

        - name: freebsd14
          <<: *defaults
          description: "FreeBSD 14"
          cloudInitConfig:
            userData:
              packages:
                - qemu-guest-agent
              runcmd:
                - sysrc qemu_guest_agent_enable=YES
                - service qemu-guest-agent start
          drives:
            - diskImageName: freebsd-14-base
              interface: virtio
              strategy: overlay
              cacheType: writeback
              discard: true
            - *ovmf_code
            - *ovmf_vars
          networkInterfaces:
            - network: corvus
          sshKeys:
            - name: corvus
