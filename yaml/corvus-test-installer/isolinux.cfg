# Route isolinux's own banner + boot diagnostics to ttyS0, so an
# isolinux-side failure (missing kernel, bad config) shows up in
# the daemon's serial buffer instead of a silent hang.
serial 0 115200

default linux
prompt 0
timeout 0

label linux
  kernel /vmlinuz
  # Pin /dev/console to the serial port — qemu's `-serial
  # chardev:serial0` redirects ttyS0 to the daemon's serial
  # socket, so anything echoed by /init lands in the bake VM's
  # serial buffer for postmortem when a bake fails.
  append initrd=/initrd.img console=ttyS0
