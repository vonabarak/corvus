; Grafana server config for the corvus-monitor image.
;
; Only overrides what's needed — everything else inherits from the
; Debian package's stock /usr/share/grafana/conf/defaults.ini.
;
; Listen on all interfaces so the host (and any TAP/user-mode
; host-forward of :3000) can reach the UI. The VM itself is the
; only thing this Grafana is intended to serve, so binding 0.0.0.0
; inside the guest is fine.

[server]
http_addr = 0.0.0.0
http_port = 3000
protocol = http

[users]
; Force first-login password change on the default admin/admin
; account. This is also the Grafana default; spelt out here so an
; operator inspecting the config can see what's enforced.
default_theme = dark

[security]
; Leave admin_user / admin_password at the Debian-package defaults
; (admin / admin) — first login forces a change. Do NOT bake a
; custom admin password into the image; operators expect the
; standard flow.
disable_initial_admin_creation = false
