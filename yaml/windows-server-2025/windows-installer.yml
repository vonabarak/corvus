---
# Windows Server 2025 installer template.
#
# Pairs with windows-server-2025.yml in this directory.
#
# Apply downloads the Windows Server 2025 evaluation ISO (~8 GiB) and
# the VirtIO-Win drivers ISO (~750 MiB) on first run; subsequent
# applies are no-ops because Corvus deduplicates by URL. Expect the
# initial apply to take a while on a slow connection.
#
# Note: fedorapeople.org's stable-virtio link 301-redirects to
# https://fedorapeople.org:3923/...; the daemon host needs outbound
# TCP to port 3923 (some restrictive networks/firewalls block it).
# If your environment can't reach port 3923, swap the
# `import:` line for a `register:` pointing at a pre-downloaded
# virtio-win.iso.
#
# The autounattend.xml floppy is built automatically by `crv build`
# from `floppy.from:` in the build YAML — no out-of-band mkfs.fat.
#
# The build then runs the bake VM headless, lets the autounattend.xml
# install Windows + qemu-ga + cloudbase-init, waits for the guest to
# shut itself down (final step of FirstLogonCommands is `shutdown /s
# /t 30 /f`), and registers the artifact disk as
# `windows-server-2025-eval`.

disks:
  # ── UEFI firmware (already present on most cloud images, but
  #    redeclared here so this file stands alone if applied first) ───
  - name: ovmf-code
    register: "/usr/share/edk2/OvmfX64/OVMF_CODE_4M.qcow2"
    format: qcow2
  - name: ovmf-vars
    register: "/usr/share/edk2/OvmfX64/OVMF_VARS_4M.qcow2"
    format: qcow2

  # ── Install media (downloaded on first apply) ────────────────────
  - name: windows-server-2025-iso
    import: "https://software-static.download.prss.microsoft.com/dbazure/998969d5-f34g-4e03-ac9d-1f9786c66749/26100.32230.260111-0550.lt_release_svc_refresh_SERVER_EVAL_x64FRE_en-us.iso"
    format: raw
    path: ISOs/Windows/
  - name: virtio-win-iso
    import: "https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/stable-virtio/virtio-win.iso"
    format: raw
    path: ISOs/VirtIO/

templates:
  - name: windows-server-2025-installer
    description: "Windows Server 2025 unattended installer (bake-only)"
    cpuCount: 4
    ramMb: 4096
    headless: false
    cloudInit: false
    # The installer ISO drives the entire bake; QGA is installed late
    # by FirstLogonCommands. We don't wait for it — the build's
    # `installer` strategy waits for guest-initiated shutdown instead.
    guestAgent: false
    drives:
      # The artifact: a fresh blank 40 GiB qcow2. The build's
      # `installer` strategy treats the bake VM's first drive as the
      # artifact, detaches it after the guest powers off, and
      # registers it under the build's target.name.
      - interface: virtio
        media: disk
        strategy: create
        format: qcow2
        sizeMb: 40960
        cacheType: writeback
      # UEFI firmware
      - diskImageName: ovmf-code
        interface: pflash
        readOnly: true
        strategy: direct
      - diskImageName: ovmf-vars
        interface: pflash
        strategy: clone
      # Windows install ISO — Windows mounts as D:
      - diskImageName: windows-server-2025-iso
        interface: ide
        media: cdrom
        readOnly: true
        strategy: direct
      # VirtIO-Win drivers + qemu-ga MSI — Windows mounts as E:.
      # The autounattend.xml's DriverPaths and qemu-ga MSI install
      # paths reference E:\ explicitly, so the order must be Windows
      # ISO before VirtIO ISO.
      - diskImageName: virtio-win-iso
        interface: ide
        media: cdrom
        readOnly: true
        strategy: direct
      # The autounattend.xml floppy is materialised per-build by
      # `crv build` from the build YAML's `floppy.from:` field, then
      # attached as `if=floppy` (Windows finds it at A: on first boot
      # of the install ISO and reads /autounattend.xml automatically).
    networkInterfaces:
      # Outbound internet for cloudbase-init MSI download.
      - type: vde
        hostDevice: /run/vde2/switch.ctl
