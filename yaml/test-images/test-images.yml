---
# An apply setup using test images (see the "scripts" directory for scripts to generate them)
disks:
  # Shared UEFI firmware code (read-only, from edk2 package)
  - name: ovmf-code
    register: "/usr/share/edk2/OvmfX64/OVMF_CODE_4M.qcow2"
    format: qcow2

  # OVMF UEFI vars (for cloning)
  - name: ovmf-vars
    register: "/usr/share/edk2/OvmfX64/OVMF_VARS_4M.qcow2"
    format: qcow2

  - name: alpine-test-base
    register: "/home/bobr/Work/corvus/.test-images/corvus-test.qcow2"
    format: qcow2

  - name: windows-server-2025-base
    register: "/home/bobr/Work/corvus/.test-images/windows-server-eval.qcow2"
    format: qcow2

  - name: windows-server-2025
    overlay: windows-server-2025-base
    path: windows-server-2025/

  - name: alpine-test
    overlay: alpine-test-base
    path: alpine-test/

  - name: alpine-test-ovmf-vars
    clone: ovmf-vars
    path: alpine-test/

  - name: windows-server-2025-ovmf-vars
    clone: ovmf-vars
    path: windows-server-2025/

vms:
  - name: alpine-test
    cpuCount: 4
    ramMb: 4096
    description: "alpine-test"
    cloudInit: true
    guestAgent: true
    drives:
      - disk: alpine-test
        interface: virtio
        media: disk
        cacheType: writeback
        discard: true
      - disk: ovmf-code
        interface: pflash
        readOnly: true
      - disk: alpine-test-ovmf-vars
        interface: pflash
    networkInterfaces:
      - type: vde
        hostDevice: /run/vde2/switch.ctl

  - name: windows-server-2025
    cpuCount: 4
    ramMb: 4096
    description: "Windows Server 2025"
    cloudInit: true
    guestAgent: true
    cloudInitConfig:
      injectSshKeys: false
      userData: |
        #ps1_sysnative
        # Set Administrator password
        net user Administrator "corvus" /y
        # Install Remote Desktop Session Host feature
        Install-WindowsFeature -Name RDS-RD-Server
        # Enable RDP connections
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name fDenyTSConnections -Value 0
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name UserAuthentication -Value 0
        # Enable RDP firewall rules
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        # Start Remote Desktop service
        Set-Service -Name TermService -StartupType Automatic
        Start-Service TermService
    drives:
      - disk: ovmf-code
        interface: pflash
        readOnly: true
      - disk: windows-server-2025-ovmf-vars
        interface: pflash
      - disk: windows-server-2025
        interface: virtio
        media: disk
        cacheType: writeback
        discard: true
    networkInterfaces:
      - type: vde
        hostDevice: /run/vde2/switch.ctl
