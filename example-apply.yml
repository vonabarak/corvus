# Example environment configuration for `crv apply`
#
# This file declares all resources needed for a complete VM environment.
# The daemon creates them in dependency order: SSH keys -> disks -> networks -> VMs.
#
# Usage:
#   crv apply example-apply.yml

sshKeys:
  - name: deploy-key
    publicKey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIExample deploy@host"

disks:
  # Import a cloud image from a URL (daemon downloads it)
  - name: alpine-base
    import: "https://dev.alpinelinux.org/~tomalok/alpine-cloud-images/v3.20/nocloud/x86_64/nocloud_alpine-3.20.9-x86_64-bios-cloudinit-r0.qcow2"

  # Create an overlay backed by the imported image
  - name: web-root
    overlay: alpine-base
    sizeMb: 10240

  # Create a new empty data disk
  - name: data-disk
    format: qcow2
    sizeMb: 20480

  # Clone a disk (full copy, useful for OVMF UEFI vars)
  # - name: ovmf-vars-template
  #   import: "/usr/share/edk2/OvmfX64/OVMF_VARS.fd"
  #   format: raw
  # - name: vm1-ovmf-vars
  #   clone: ovmf-vars-template

  # --- Path examples ---
  # The optional `path` field controls where the disk file is placed.
  # Rules:
  #   - Starts with /  -> absolute path
  #   - Otherwise       -> relative to base images dir ($HOME/VMs)
  #   - Ends with /     -> directory (filename auto-generated from name + format)
  #   - No trailing /   -> full file path
  #
  # Overlay in a subdirectory of the base images path:
  # - name: vm1-root
  #   overlay: alpine-base
  #   path: "vm1/"                  # -> $HOME/VMs/vm1/vm1-root.qcow2
  #
  # Clone to an absolute directory:
  # - name: vm1-ovmf-vars
  #   clone: ovmf-vars-template
  #   path: "/data/vms/"            # -> /data/vms/vm1-ovmf-vars.fd
  #
  # Clone with an explicit file path:
  # - name: special-vars
  #   clone: ovmf-vars-template
  #   path: "/data/vms/custom.fd"   # -> /data/vms/custom.fd
  #
  # Create a data disk in a subdirectory:
  # - name: vm1-data
  #   format: qcow2
  #   sizeMb: 51200
  #   path: "vm1/"                  # -> $HOME/VMs/vm1/vm1-data.qcow2

  # Import from a local path on the daemon host
  # - name: custom-image
  #   import: /var/lib/corvus/images/custom.qcow2
  #   format: qcow2

networks:
  - name: lab-net
    subnet: "10.0.1.0/24"

vms:
  - name: web-server
    cpuCount: 2
    ramMb: 2048
    description: "Web server with Alpine Linux"
    headless: true
    guestAgent: true
    drives:
      - disk: web-root
        interface: virtio
      - disk: data-disk
        interface: virtio
    networkInterfaces:
      - type: vde
        network: lab-net
      - type: user
    sharedDirs:
      - path: /home/user/www
        tag: www
        cache: auto
        readOnly: true
    sshKeys:
      - deploy-key
